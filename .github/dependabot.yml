version: 2

updates:
  # Third-party actions are pinned to full commit SHAs. Dependabot understands
  # the `# vX.Y.Z` trailing comment and bumps both the SHA and the comment, so
  # pinning costs no maintenance burden.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ['*']
    commit-message:
      prefix: 'chore(deps)'
