# Reusable GKE service deploy: build → push (GAR, gha-cached) → roll a workload.
#
# The Just-Git-Dev replacement for `zopsmart/workflows` stage/prod-deploy, scoped
# to GKE. Two things it fixes versus the external system: it authenticates with
# keyless WIF (no stored SA JSON key), and it is SHA-pinned and versioned here
# instead of floating on an external `@main`.
#
# Deploy methods:
#   kubectl (default) — `kubectl set image` on a Deployment or CronJob.
#   helm             — `helm upgrade --install` with a chart + values.
#
# Monorepo change-detection / path-filtering stays in the caller's `on.paths`
# (that is where it belongs). Config/secret VALUES are not managed here — a GKE
# service's ConfigMap and secrets are managed by `manage-config-secrets` (Cloud
# Run bundles are `sync-bundle-key`). A stage→prod promote (no rebuild) is
# `promote-image`, and non-GCP / key-based clusters use `deploy-cluster-keyed`.
name: deploy-gke-service

on:
  workflow_call:
    inputs:
      gcp_region:
        description: 'Region of the Artifact Registry host (…-docker.pkg.dev).'
        type: string
        required: true
      gar_project:
        description: 'GCP project owning the Artifact Registry repo. Defaults to cluster_project.'
        type: string
        required: false
        default: ''
      gar_repo:
        description: 'Artifact Registry repository name.'
        type: string
        required: true
      image_name:
        description: 'Image name within the GAR repo (may contain slashes, e.g. staging/api).'
        type: string
        required: true
      image_tag:
        description: 'Image tag. Empty ⇒ the commit SHA.'
        type: string
        required: false
        default: ''
      wif_provider:
        description: 'Workload Identity Federation provider resource name.'
        type: string
        required: true
      service_account:
        description: 'Deployer service account email to impersonate via WIF.'
        type: string
        required: true
      cluster_project:
        description: 'GCP project owning the GKE cluster.'
        type: string
        required: true
      cluster_name:
        description: 'GKE cluster name.'
        type: string
        required: true
      cluster_location:
        description: 'GKE cluster region or zone.'
        type: string
        required: true
      namespace:
        description: 'Kubernetes namespace.'
        type: string
        required: true
      svc_name:
        description: 'Workload name AND container name (kubectl set image sets svc=image).'
        type: string
        required: true
      workload_type:
        description: 'deployment | cron.'
        type: string
        required: false
        default: 'deployment'
      deploy_method:
        description: 'kubectl | helm.'
        type: string
        required: false
        default: 'kubectl'
      context:
        description: 'Docker build context.'
        type: string
        required: false
        default: '.'
      dockerfile:
        description: 'Dockerfile path, relative to context.'
        type: string
        required: false
        default: 'Dockerfile'
      platforms:
        description: 'Target build platform(s).'
        type: string
        required: false
        default: 'linux/amd64'
      build_args:
        description: 'Newline-separated docker build args.'
        type: string
        required: false
        default: ''
      cache_scope:
        description: 'BuildKit gha cache scope. Empty ⇒ image_name. Give each service
          its own scope so parallel matrix legs do not evict one another''s cache
          (mode=max writes are per-scope). Set to a shared value only to deliberately
          share layers between services.'
        type: string
        required: false
        default: ''
      helm_chart:
        description: 'Chart reference (required when deploy_method=helm).'
        type: string
        required: false
        default: ''
      helm_release:
        description: 'Helm release name. Defaults to svc_name.'
        type: string
        required: false
        default: ''
      helm_values_path:
        description: 'Path to a Helm values file.'
        type: string
        required: false
        default: ''
      helm_extra_args:
        description: 'Extra args appended to `helm upgrade`.'
        type: string
        required: false
        default: ''
      app_version:
        description: 'When set (kubectl/deployment), `kubectl set env APP_VERSION=…` after the image roll.'
        type: string
        required: false
        default: ''
      timeout_minutes:
        description: 'Job timeout.'
        type: number
        required: false
        default: 20
      dry_run:
        description: 'Build only: do not push, and pass --dry-run to kubectl/helm.'
        type: boolean
        required: false
        default: false
      environment:
        description: >-
          Environment name (e.g. staging, production). When set, records a GitHub
          Deployment marking this env's live commit — the git-native half of the
          live-commit record that forward-only reads back. Empty ⇒ no Deployment
          record (the workload annotation is still stamped on the kubectl path).
        type: string
        required: false
        default: ''
      record_github_deployment:
        description: 'Record a GitHub Deployment (needs `environment` set + `deployments: write`).'
        type: boolean
        required: false
        default: true
      enforce_forward_only:
        description: >-
          Reject a deploy whose commit is BEHIND this environment's current live
          commit (an out-of-order / older deploy). Reads the live commit from the
          latest successful GitHub Deployment for `environment`, compares via the
          GitHub compare API, blocks only when strictly behind ("block iff behind" —
          allows ahead/diverged/identical, so a stage lineage switch passes).
          Requires `environment`. Opt-in (default off). Runs before the build, so a
          blocked deploy wastes no build.
        type: boolean
        required: false
        default: false
    secrets:
      build_secrets:
        description: >-
          Docker BuildKit secrets, newline `id=value` pairs, forwarded to
          build-push-action `secrets:`. Consume in the Dockerfile with
          `RUN --mount=type=secret,id=<id>` — for private-module tokens that must
          not land in an image layer or build-arg.
        required: false
    outputs:
      image:
        description: 'Fully-qualified image reference that was built.'
        value: ${{ jobs.deploy.outputs.image }}

permissions:
  contents: read
  id-token: write
  deployments: write

concurrency:
  group: deploy-gke-${{ inputs.cluster_name }}-${{ inputs.namespace }}-${{ inputs.svc_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: build · push · ${{ inputs.deploy_method }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    outputs:
      image: ${{ steps.ref.outputs.image }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Resolve image ref
        id: ref
        env:
          REGION: ${{ inputs.gcp_region }}
          GAR_PROJECT: ${{ inputs.gar_project != '' && inputs.gar_project || inputs.cluster_project }}
          GAR_REPO: ${{ inputs.gar_repo }}
          IMAGE_NAME: ${{ inputs.image_name }}
          IN_TAG: ${{ inputs.image_tag }}
        run: |
          TAG="${IN_TAG:-$GITHUB_SHA}"
          echo "image=${REGION}-docker.pkg.dev/${GAR_PROJECT}/${GAR_REPO}/${IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve built commit
        id: commit
        # The exact commit built — stamped onto the workload so forward-only can
        # read back "what is live" for this environment.
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Forward-only: reject an out-of-order (older) deploy before the build.
      # Uses github.token only (no cloud auth), so it runs early and fails fast.
      - name: Forward-only guard
        if: ${{ inputs.enforce_forward_only }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ENVIRONMENT: ${{ inputs.environment }}
          HEAD: ${{ steps.commit.outputs.sha }}
        run: |
          if [ -z "$ENVIRONMENT" ]; then
            echo "::error::enforce_forward_only requires 'environment' (to read the live commit)." >&2
            exit 1
          fi
          # Live baseline = sha of the most recent SUCCESSFUL deployment for the env
          # (deployment ids are monotonic, so sort desc for newest-first).
          BASE=""
          for id in $(gh api "repos/${REPO}/deployments?environment=${ENVIRONMENT}&per_page=30" \
                        --jq 'sort_by(.id) | reverse | .[].id' 2>/dev/null); do
            state="$(gh api "repos/${REPO}/deployments/${id}/statuses?per_page=1" --jq '.[0].state // ""' 2>/dev/null || echo '')"
            if [ "$state" = "success" ]; then
              BASE="$(gh api "repos/${REPO}/deployments/${id}" --jq '.sha' 2>/dev/null || echo '')"
              break
            fi
          done
          if [ -z "$BASE" ]; then
            echo "::notice::forward-only: no prior successful deployment for '${ENVIRONMENT}' — allowing (no baseline)."
            exit 0
          fi
          if [ "$BASE" = "$HEAD" ]; then
            echo "::notice::forward-only: candidate equals live (${HEAD}) — no-op, allowed."
            exit 0
          fi
          # compare BASE...HEAD: 'behind' ⇒ HEAD is an ancestor of BASE ⇒ out-of-order.
          STATUS="$(gh api "repos/${REPO}/compare/${BASE}...${HEAD}" --jq '.status' 2>/dev/null || echo 'ERROR')"
          case "$STATUS" in
            behind)
              echo "::error::forward-only: candidate ${HEAD} is BEHIND live ${BASE} for '${ENVIRONMENT}' — refusing out-of-order deploy." >&2
              exit 1 ;;
            ahead|identical|diverged)
              echo "::notice::forward-only OK: ${HEAD} is '${STATUS}' relative to live ${BASE}." ;;
            *)
              # Fail closed: a safety guard must not wave a deploy through on an API error.
              echo "::error::forward-only: could not compare ${BASE}...${HEAD} (compare API error/unknown commit). Refusing; re-run, or set enforce_forward_only:false to override." >&2
              exit 1 ;;
          esac

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ inputs.wif_provider }}
          service_account: ${{ inputs.service_account }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker "${{ inputs.gcp_region }}-docker.pkg.dev" --quiet

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Resolve cache scope
        id: cache
        env:
          CACHE_SCOPE: ${{ inputs.cache_scope }}
          IMAGE_NAME: ${{ inputs.image_name }}
        run: |
          # Per-service scope (default: image_name). Without a scope, a matrix of
          # services shares one gha cache and mode=max writes evict each other.
          echo "scope=${CACHE_SCOPE:-$IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ !inputs.dry_run }}
          build-args: ${{ inputs.build_args }}
          secrets: ${{ secrets.build_secrets }}
          tags: ${{ steps.ref.outputs.image }}
          cache-from: type=gha,scope=${{ steps.cache.outputs.scope }}
          cache-to: type=gha,mode=max,scope=${{ steps.cache.outputs.scope }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@3da1e46a907576cefaa90c484278bb5b259dd395 # v3.0.0
        with:
          cluster_name: ${{ inputs.cluster_name }}
          location: ${{ inputs.cluster_location }}
          project_id: ${{ inputs.cluster_project }}

      - name: Set up Helm
        if: ${{ inputs.deploy_method == 'helm' }}
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Roll workload (kubectl)
        if: ${{ inputs.deploy_method == 'kubectl' }}
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
          SVC: ${{ inputs.svc_name }}
          NS: ${{ inputs.namespace }}
          WORKLOAD_TYPE: ${{ inputs.workload_type }}
          APP_VERSION: ${{ inputs.app_version }}
          COMMIT: ${{ steps.commit.outputs.sha }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          case "$WORKLOAD_TYPE" in
            deployment) KIND=deployment ;;
            cron)       KIND=cronjob ;;
            *) echo "::error::workload_type must be 'deployment' or 'cron'" >&2; exit 1 ;;
          esac
          DR=()
          [ "$DRY_RUN" = "true" ] && DR=(--dry-run=client)
          kubectl set image "${KIND}/${SVC}" "${SVC}=${IMAGE}" --namespace "$NS" "${DR[@]}"
          # Stamp the live commit so forward-only can read it back.
          if [ -n "$COMMIT" ]; then
            kubectl annotate "${KIND}/${SVC}" "jgd.dev/commit=${COMMIT}" --overwrite --namespace "$NS" "${DR[@]}"
          fi
          if [ -n "$APP_VERSION" ] && [ "$KIND" = "deployment" ]; then
            kubectl set env "deployment/${SVC}" "APP_VERSION=${APP_VERSION}" --namespace "$NS" "${DR[@]}"
          fi

      - name: Roll workload (helm)
        if: ${{ inputs.deploy_method == 'helm' }}
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
          RELEASE: ${{ inputs.helm_release != '' && inputs.helm_release || inputs.svc_name }}
          CHART: ${{ inputs.helm_chart }}
          NS: ${{ inputs.namespace }}
          VALUES: ${{ inputs.helm_values_path }}
          EXTRA: ${{ inputs.helm_extra_args }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ -z "$CHART" ]; then
            echo "::error::helm_chart is required when deploy_method=helm" >&2
            exit 1
          fi
          set -- helm upgrade --install "$RELEASE" "$CHART" \
            --namespace "$NS" --set image="$IMAGE"
          [ -n "$VALUES" ] && set -- "$@" --values "$VALUES"
          [ "$DRY_RUN" = "true" ] && set -- "$@" --dry-run
          # shellcheck disable=SC2086
          "$@" $EXTRA

      - name: Record GitHub Deployment (live-commit marker)
        if: ${{ inputs.environment != '' && inputs.record_github_deployment && !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMIT: ${{ steps.commit.outputs.sha }}
          ENVIRONMENT: ${{ inputs.environment }}
          IMAGE: ${{ steps.ref.outputs.image }}
        run: |
          # Best-effort audit record: the roll already happened, so a Deployments
          # API hiccup must NOT fail the job. Warn and move on.
          [ -z "$COMMIT" ] && { echo "::warning::no commit resolved; skipping Deployment record." >&2; exit 0; }
          BODY="$(jq -nc \
            --arg ref "$COMMIT" --arg env "$ENVIRONMENT" --arg desc "deploy ${IMAGE}" \
            '{ref:$ref, environment:$env, description:$desc, auto_merge:false, required_contexts:[]}')"
          DEP_ID="$(printf '%s' "$BODY" | gh api "repos/${REPO}/deployments" --input - --jq '.id' 2>/dev/null || true)"
          if [ -z "$DEP_ID" ] || [ "$DEP_ID" = "null" ]; then
            echo "::warning::could not create GitHub Deployment (missing deployments: write, or API conflict); workload annotation still stamped." >&2
            exit 0
          fi
          gh api "repos/${REPO}/deployments/${DEP_ID}/statuses" \
            -f state=success -f environment="$ENVIRONMENT" -f description="deploy ${IMAGE}" >/dev/null 2>&1 \
            || echo "::warning::deployment #${DEP_ID} created but status update failed." >&2
          echo "::notice::recorded GitHub Deployment #${DEP_ID} (${ENVIRONMENT} @ ${COMMIT})"

      - name: Summary
        if: ${{ always() }}
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          {
            echo "## GKE deploy — ${{ inputs.svc_name }}"
            echo ""
            echo "- Method: \`${{ inputs.deploy_method }}\`${DRY_RUN:+ (dry run)}"
            echo "- Cluster: \`${{ inputs.cluster_name }}\` / ns \`${{ inputs.namespace }}\`"
            echo "- Image: \`$IMAGE\`"
          } >> "$GITHUB_STEP_SUMMARY"
