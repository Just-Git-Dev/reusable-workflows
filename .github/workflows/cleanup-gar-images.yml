name: Cleanup GAR images (reusable)

# Age-sweeps every image in a Google Artifact Registry Docker repo.
#
# The keep-set is built from:
#   - live digests referenced by ALL Cloud Run Services AND Jobs in-region
#     (cron/migration containers commonly live on Jobs, not Services)
#   - the most-recent N semver (vX.Y.Z) tags per image
#   - any tag in keep_tags, or matching a prefix in keep_tag_prefixes
# Everything else is deleted once older than the untagged/tagged age limits.
#
# The caller owns the schedule and the dry_run decision. This workflow performs
# exactly what dry_run says. Run with dry_run: true first and read the plan.
#
# Required IAM on service_account:
#   roles/artifactregistry.repoAdmin  (on the target repo)
#   roles/run.viewer                  (to enumerate live Services + Jobs)

on:
  workflow_call:
    inputs:
      gcp_project:
        description: 'GCP project id owning the Artifact Registry repo.'
        type: string
        required: true
      gcp_region:
        description: 'Region of both the Artifact Registry repo and the Cloud Run Services/Jobs.'
        type: string
        required: false
        default: 'asia-southeast1'
      wif_provider:
        description: 'Workload Identity Federation provider resource name.'
        type: string
        required: true
      service_account:
        description: 'Service account email to impersonate via WIF.'
        type: string
        required: true
      gar_repo:
        description: 'Artifact Registry repository name (e.g. backend).'
        type: string
        required: true
      keep_semver_count:
        description: 'Per image, keep this many of the most recent vX.Y.Z-tagged digests.'
        type: string
        required: false
        default: '5'
      untagged_max_age_days:
        description: 'Delete untagged manifests at least this many days old.'
        type: string
        required: false
        default: '15'
      tagged_max_age_days:
        description: 'Delete tagged images at least this many days old, unless in the keep-set.'
        type: string
        required: false
        default: '30'
      keep_tags:
        description: 'Comma-separated exact tags that are never deleted.'
        type: string
        required: false
        default: 'latest,buildcache'
      keep_tag_prefixes:
        description: 'Comma-separated tag prefixes that are never deleted.'
        type: string
        required: false
        default: 'hotfix-,rc-,debug-'
      dry_run:
        description: 'true = print the plan only, delete nothing.'
        type: boolean
        required: false
        default: true
    outputs:
      candidates:
        description: 'Number of image versions selected for deletion by the plan.'
        value: ${{ jobs.cleanup.outputs.candidates }}
      deleted:
        description: 'Number of image versions actually deleted (0 on a dry run).'
        value: ${{ jobs.cleanup.outputs.deleted }}
      skipped:
        description: 'Deletions skipped because the manifest was already gone or held by a kept parent.'
        value: ${{ jobs.cleanup.outputs.skipped }}

permissions:
  contents: read
  id-token: write

concurrency:
  # Deletions run with `xargs -P 8`; never let two sweeps of the same repo
  # race on a delete-set computed before the other sweep started.
  group: cleanup-gar-${{ inputs.gcp_project }}-${{ inputs.gar_repo }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    env:
      GCP_PROJECT: ${{ inputs.gcp_project }}
      GCP_REGION:  ${{ inputs.gcp_region }}
      GAR_REPO:    ${{ inputs.gar_repo }}
      REPO_PATH:   ${{ inputs.gcp_region }}-docker.pkg.dev/${{ inputs.gcp_project }}/${{ inputs.gar_repo }}
      KEEP_SEMVER_COUNT:     ${{ inputs.keep_semver_count }}
      UNTAGGED_MAX_AGE_DAYS: ${{ inputs.untagged_max_age_days }}
      TAGGED_MAX_AGE_DAYS:   ${{ inputs.tagged_max_age_days }}
      KEEP_TAGS:             ${{ inputs.keep_tags }}
      KEEP_TAG_PREFIXES:     ${{ inputs.keep_tag_prefixes }}
      DRY_RUN:               ${{ inputs.dry_run }}
    outputs:
      candidates: ${{ steps.plan.outputs.candidates }}
      deleted: ${{ steps.exec.outputs.deleted }}
      skipped: ${{ steps.exec.outputs.skipped }}

    steps:
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ inputs.wif_provider }}
          service_account:            ${{ inputs.service_account }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Collect live image digests (all Services + Jobs)
        run: |
          set -euo pipefail
          : > /tmp/live-digests.txt

          resolve() {
            local ref="$1"
            if [[ "$ref" == *@sha256:* ]]; then
              echo "${ref#*@}"
            else
              gcloud artifacts docker images describe "$ref" \
                --format='value(image_summary.digest)' 2>/dev/null || echo ""
            fi
          }

          record() {
            local kind="$1" name="$2" img="$3"
            [ -z "$img" ] && return 0
            case "$img" in
              "$REPO_PATH"/*) ;;
              *) echo "skip (other repo): $kind/$name -> $img"; return 0 ;;
            esac
            local dig
            dig=$(resolve "$img")
            if [ -z "$dig" ]; then
              echo "::error::Could not resolve live image for $kind/$name ($img). Aborting for safety."
              exit 1
            fi
            echo "$dig" >> /tmp/live-digests.txt
            echo "live: $kind/$name -> $img ($dig)"
          }

          for svc in $(gcloud run services list --region="$GCP_REGION" --project="$GCP_PROJECT" \
                         --format='value(metadata.name)'); do
            IMG=$(gcloud run services describe "$svc" --region="$GCP_REGION" --project="$GCP_PROJECT" \
                    --format='value(spec.template.spec.containers[0].image)' 2>/dev/null || echo "")
            record service "$svc" "$IMG"
          done

          for job in $(gcloud run jobs list --region="$GCP_REGION" --project="$GCP_PROJECT" \
                         --format='value(metadata.name)'); do
            IMG=$(gcloud run jobs describe "$job" --region="$GCP_REGION" --project="$GCP_PROJECT" \
                    --format='value(spec.template.spec.template.spec.containers[0].image)' 2>/dev/null || echo "")
            record job "$job" "$IMG"
          done

          sort -u -o /tmp/live-digests.txt /tmp/live-digests.txt
          COUNT=$(wc -l < /tmp/live-digests.txt | tr -d ' ')
          echo "Collected $COUNT live digest(s)."
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No live digests resolved for $REPO_PATH. Aborting for safety."
            exit 1
          fi

      - name: Compute delete-set (all images in repo)
        id: plan
        run: |
          python3 <<'PY' | tee /tmp/delete-plan.json
          import json, os, subprocess, re
          from datetime import datetime, timezone

          REPO_PATH = os.environ["REPO_PATH"]
          KEEP_SEMVER_COUNT = int(os.environ["KEEP_SEMVER_COUNT"])
          UNTAGGED_MAX_AGE_DAYS = int(os.environ["UNTAGGED_MAX_AGE_DAYS"])
          TAGGED_MAX_AGE_DAYS = int(os.environ["TAGGED_MAX_AGE_DAYS"])

          def csv(name):
              return tuple(p for p in (s.strip() for s in os.environ.get(name, "").split(",")) if p)

          keep_tags = frozenset(csv("KEEP_TAGS"))
          keep_prefixes = csv("KEEP_TAG_PREFIXES")

          with open("/tmp/live-digests.txt") as fh:
              live_digests = {ln.strip() for ln in fh if ln.strip()}

          raw = subprocess.check_output([
              "gcloud", "artifacts", "docker", "images", "list",
              REPO_PATH, "--include-tags", "--format=json",
          ])
          images = json.loads(raw)

          now = datetime.now(timezone.utc)
          semver_re = re.compile(r"^v\d+\.\d+\.\d+$")

          def protected(tag):
              return tag in keep_tags or (bool(keep_prefixes) and tag.startswith(keep_prefixes))

          by_pkg = {}
          for img in images:
              by_pkg.setdefault(img.get("package"), []).append(img)

          keep = set(live_digests)
          for pkg, imgs in by_pkg.items():
              for img in imgs:
                  tags = img.get("tags", []) or []
                  if any(protected(t) for t in tags):
                      keep.add(img.get("version"))
              semver_imgs = []
              for img in imgs:
                  for t in (img.get("tags", []) or []):
                      if semver_re.match(t):
                          semver_imgs.append((img.get("updateTime"), img.get("version")))
                          break
              semver_imgs.sort(reverse=True)
              for _, digest in semver_imgs[:KEEP_SEMVER_COUNT]:
                  keep.add(digest)

          to_delete = []
          per_pkg = {}
          for img in images:
              pkg = img.get("package")
              digest = img.get("version")
              tags = img.get("tags", []) or []
              update_time = img.get("updateTime")
              per_pkg.setdefault(pkg, {"total": 0, "delete": 0})
              per_pkg[pkg]["total"] += 1
              if not update_time or digest in keep:
                  continue
              try:
                  ts = datetime.fromisoformat(update_time.replace("Z", "+00:00"))
              except Exception:
                  continue
              age_days = (now - ts).days
              if not tags and age_days >= UNTAGGED_MAX_AGE_DAYS:
                  reason = f"untagged>={UNTAGGED_MAX_AGE_DAYS}d"
              elif tags and age_days >= TAGGED_MAX_AGE_DAYS:
                  reason = f"tagged>={TAGGED_MAX_AGE_DAYS}d"
              else:
                  continue
              per_pkg[pkg]["delete"] += 1
              to_delete.append({
                  "image": f"{pkg}@{digest}",
                  "package": pkg,
                  "digest": digest,
                  "tags": tags,
                  "age_days": age_days,
                  "reason": reason,
              })

          print(json.dumps({
              "total_images": len(images),
              "live_digests": len(live_digests),
              "kept": len(keep),
              "to_delete": to_delete,
              "per_package": per_pkg,
          }, indent=2))
          PY

          echo "candidates=$(jq '.to_delete | length' /tmp/delete-plan.json)" >> "$GITHUB_OUTPUT"

      - name: Print summary of delete-set
        run: |
          TOTAL=$(jq '.total_images' /tmp/delete-plan.json)
          KEPT=$(jq '.kept' /tmp/delete-plan.json)
          LIVE=$(jq '.live_digests' /tmp/delete-plan.json)
          DEL=$(jq '.to_delete | length' /tmp/delete-plan.json)
          {
            echo "## GAR cleanup plan — ${REPO_PATH}"
            echo ""
            echo "- Total image versions: $TOTAL"
            echo "- Live digests protected: $LIVE"
            echo "- Kept (live + semver + keep_tags/prefixes): $KEPT"
            echo "- Delete candidates: $DEL"
            echo "- Dry run: ${DRY_RUN}"
            echo ""
            echo "> Untagged child manifests of a KEPT parent index can't be deleted"
            echo "> while the parent exists — those are skipped at execution."
            echo ""
            echo "### Per image (candidates)"
            echo ""
            jq -r '.per_package | to_entries[] | "- `\(.key)` — \(.value.delete)/\(.value.total) candidates"' /tmp/delete-plan.json
            echo ""
            echo "### Candidates"
            echo ""
            jq -r '.to_delete[] | "- `\(.image)` (\(.reason), age \(.age_days)d, tags: \(.tags | join(",") // "none"))"' /tmp/delete-plan.json
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Execute deletions
        id: exec
        if: inputs.dry_run == false
        run: |
          set -uo pipefail

          del_one() {
            local img="$1" err rc
            err=$(gcloud artifacts docker images delete "$img" \
                    --delete-tags --quiet --project="$GCP_PROJECT" 2>&1); rc=$?
            if [ "$rc" -eq 0 ]; then
              echo "OK deleted $img"
            elif printf '%s' "$err" | grep -q "referenced by parent manifests"; then
              echo "OK skipped(kept-parent) $img"
            elif printf '%s' "$err" | grep -qiE "not found|does not exist|NOT_FOUND"; then
              echo "OK skipped(gone) $img"
            else
              echo "FAIL $img :: $(printf '%s' "$err" | tr '\n' ' ')"
            fi
            return 0
          }
          export -f del_one
          export GCP_PROJECT

          : > /tmp/exec.log

          # Phase 1: tagged indexes first (cascades free orphaned children).
          jq -r '.to_delete[] | select((.tags|length) > 0) | .image' /tmp/delete-plan.json \
            | xargs -r -P 8 -I {} bash -c 'del_one "$@"' _ {} | tee -a /tmp/exec.log

          # Phase 2: untagged manifests.
          jq -r '.to_delete[] | select((.tags|length) == 0) | .image' /tmp/delete-plan.json \
            | xargs -r -P 8 -I {} bash -c 'del_one "$@"' _ {} | tee -a /tmp/exec.log

          DELETED=$(grep -c '^OK deleted ' /tmp/exec.log || true)
          SKIPPED=$(grep -c '^OK skipped' /tmp/exec.log || true)
          FAILED=$(grep -c '^FAIL ' /tmp/exec.log || true)
          echo "deleted=$DELETED skipped=$SKIPPED failed=$FAILED"
          {
            echo "deleted=$DELETED"
            echo "skipped=$SKIPPED"
            echo "failed=$FAILED"
          } >> "$GITHUB_OUTPUT"
          {
            echo "## Execution result"
            echo ""
            echo "- Deleted: $DELETED"
            echo "- Skipped (kept-parent child / already gone): $SKIPPED"
            echo "- Failed: $FAILED"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED deletion(s) failed for unexpected reasons:"
            grep '^FAIL ' /tmp/exec.log || true
            exit 1
          fi
