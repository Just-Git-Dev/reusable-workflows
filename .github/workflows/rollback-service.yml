# Reusable transient rollback: roll a running service back onto an ALREADY-BUILT,
# previously-shipped image (by tag or digest) WITHOUT rebuilding or retagging.
#
# This is the out-of-band "stop the bleeding" bridge described in
# docs/release-process.md. It is deliberately SEPARATE from the forward-only,
# immutable-tag promote flow (promote-image): a fast rollback is a temporary
# BACKWARD artifact move, so mixing it into the forward promote path would corrupt
# that invariant. The permanent fix is always `git revert` + a new linear tag
# through promote-image; this workflow only buys time until that ships.
#
# No pin/freeze is set: this stack is push-based (Cloud Run / GKE hold the image
# they were rolled to — no reconciler re-derives "latest tag"), so nothing
# autonomously clobbers a rollback. The only re-clobber risk is a human manually
# re-promoting the bad tag mid-incident; guard that with artifact quarantine in
# promote-image if ever needed (see TODO), not a blanket freeze here.
#
# Auth mirrors promote-image: keyless WIF (wif_provider + service_account)
# preferred; empty wif_provider ⇒ key-based (registry_credentials verifies the
# image exists, cluster_credentials authenticates the roll).
name: rollback-service

on:
  workflow_call:
    inputs:
      gcp_region:
        description: >-
          Region of the Artifact Registry host (…-docker.pkg.dev). Used to derive
          the host when image_registry is empty, and as the Cloud Run region
          default.
        type: string
        required: true
      image_registry:
        description: >-
          Full Artifact Registry host (e.g. us-central1-docker.pkg.dev). Empty ⇒
          derived as `<gcp_region>-docker.pkg.dev`.
        type: string
        required: false
        default: ''
      gar_project:
        description: 'GCP project owning the Artifact Registry repo.'
        type: string
        required: true
      gar_repo:
        description: 'Artifact Registry repository name.'
        type: string
        required: true
      image_name:
        description: 'Image name within the GAR repo (may contain slashes, e.g. staging/api).'
        type: string
        required: true
      rollback_tag:
        description: >-
          Existing tag to roll the service back TO (e.g. a prior vX.Y.Z). Provide
          exactly one of rollback_tag / rollback_digest.
        type: string
        required: false
        default: ''
      rollback_digest:
        description: >-
          Existing digest to roll back TO (sha256:…). Immutable — the safest
          rollback target. Provide exactly one of rollback_tag / rollback_digest.
        type: string
        required: false
        default: ''
      commit_sha:
        description: >-
          Source commit the rolled-to image was built from. Stamped onto the
          service (Cloud Run label / GKE annotation) and recorded as the env's live
          commit so forward-only stays accurate after the rollback. Strongly
          recommended; empty ⇒ stamping/deployment-record are skipped.
        type: string
        required: false
        default: ''
      reason:
        description: 'Free-text incident reference, recorded in the run summary and the GitHub Deployment.'
        type: string
        required: false
        default: ''
      environment:
        description: 'Environment name for the GitHub Deployment record (e.g. production, staging).'
        type: string
        required: false
        default: 'production'
      record_github_deployment:
        description: >-
          Record a GitHub Deployment (+ success status) marking this environment's
          live commit = commit_sha. Requires `deployments: write` on the caller and
          a non-empty commit_sha.
        type: boolean
        required: false
        default: true
      wif_provider:
        description: >-
          Workload Identity Federation provider resource name. Empty ⇒ KEY-BASED
          auth: image verification uses `registry_credentials`, the roll uses
          `cluster_credentials`.
        type: string
        required: false
        default: ''
      service_account:
        description: 'Service account email to impersonate via WIF (WIF path only).'
        type: string
        required: false
        default: ''
      deploy_target:
        description: 'gke | cloud-run — what to roll. (No "none": a rollback must roll something.)'
        type: string
        required: true
      # --- gke roll (deploy_target=gke) ---
      cluster_project:
        description: 'GCP project owning the GKE cluster.'
        type: string
        required: false
        default: ''
      cluster_name:
        description: 'GKE cluster name.'
        type: string
        required: false
        default: ''
      cluster_location:
        description: 'GKE cluster region or zone.'
        type: string
        required: false
        default: ''
      namespace:
        description: 'Kubernetes namespace.'
        type: string
        required: false
        default: ''
      svc_name:
        description: 'Workload AND container name (kubectl set image sets svc=image).'
        type: string
        required: false
        default: ''
      workload_type:
        description: 'deployment | cron.'
        type: string
        required: false
        default: 'deployment'
      deploy_method:
        description: 'kubectl | helm.'
        type: string
        required: false
        default: 'kubectl'
      helm_chart:
        description: 'Chart reference (required when deploy_method=helm).'
        type: string
        required: false
        default: ''
      helm_release:
        description: 'Helm release name. Defaults to svc_name.'
        type: string
        required: false
        default: ''
      helm_values_path:
        description: 'Path to a Helm values file.'
        type: string
        required: false
        default: ''
      helm_extra_args:
        description: 'Extra args appended to `helm upgrade`.'
        type: string
        required: false
        default: ''
      app_version:
        description: 'When set (kubectl/deployment), `kubectl set env APP_VERSION=…` after the roll.'
        type: string
        required: false
        default: ''
      # --- cloud-run roll (deploy_target=cloud-run) ---
      run_project:
        description: 'GCP project owning the Cloud Run service. Defaults to gar_project.'
        type: string
        required: false
        default: ''
      run_region:
        description: 'Cloud Run region. Defaults to gcp_region.'
        type: string
        required: false
        default: ''
      run_service:
        description: 'Cloud Run service name.'
        type: string
        required: false
        default: ''
      timeout_minutes:
        description: 'Job timeout.'
        type: number
        required: false
        default: 15
      dry_run:
        description: 'Print the roll commands without executing them.'
        type: boolean
        required: false
        default: false
    secrets:
      registry_credentials:
        description: >-
          GCP SA-key JSON used to verify the rollback image exists
          (`gcloud container images describe`). Required when `wif_provider` is
          empty; ignored on the WIF path.
        required: false
      cluster_credentials:
        description: >-
          GCP SA-key JSON used to authenticate the roll (GKE/Cloud Run). Required
          when `wif_provider` is empty; ignored on the WIF path. May equal
          `registry_credentials`.
        required: false
    outputs:
      image:
        description: 'Fully-qualified image the service was rolled back onto.'
        value: ${{ jobs.rollback.outputs.image }}

permissions:
  contents: read
  id-token: write
  deployments: write

concurrency:
  # Serialize with normal promotes AND other rollbacks for the same target so the
  # last write wins deterministically.
  group: deploy-${{ inputs.gar_project }}-${{ inputs.image_name }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  rollback:
    name: rollback · roll ${{ inputs.deploy_target }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    outputs:
      image: ${{ steps.ref.outputs.image }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Resolve rollback target
        id: ref
        env:
          REGION: ${{ inputs.gcp_region }}
          IN_REGISTRY: ${{ inputs.image_registry }}
          GAR_PROJECT: ${{ inputs.gar_project }}
          GAR_REPO: ${{ inputs.gar_repo }}
          IMAGE_NAME: ${{ inputs.image_name }}
          ROLLBACK_TAG: ${{ inputs.rollback_tag }}
          ROLLBACK_DIGEST: ${{ inputs.rollback_digest }}
          DEPLOY_TARGET: ${{ inputs.deploy_target }}
        run: |
          case "$DEPLOY_TARGET" in
            gke|cloud-run) ;;
            *) echo "::error::deploy_target must be 'gke' or 'cloud-run' (got '$DEPLOY_TARGET')." >&2; exit 1 ;;
          esac

          if [ -n "$ROLLBACK_TAG" ] && [ -n "$ROLLBACK_DIGEST" ]; then
            echo "::error::provide exactly one of rollback_tag / rollback_digest, not both." >&2
            exit 1
          fi
          if [ -z "$ROLLBACK_TAG" ] && [ -z "$ROLLBACK_DIGEST" ]; then
            echo "::error::provide one of rollback_tag / rollback_digest — nothing to roll back to." >&2
            exit 1
          fi

          HOST="${IN_REGISTRY:-${REGION}-docker.pkg.dev}"
          BASE="${HOST}/${GAR_PROJECT}/${GAR_REPO}/${IMAGE_NAME}"
          if [ -n "$ROLLBACK_DIGEST" ]; then
            IMAGE="${BASE}@${ROLLBACK_DIGEST}"
            RELEASE_LABEL="$ROLLBACK_DIGEST"
          else
            IMAGE="${BASE}:${ROLLBACK_TAG}"
            RELEASE_LABEL="$ROLLBACK_TAG"
          fi

          {
            echo "image=$IMAGE"
            echo "release_label=$RELEASE_LABEL"
          } >> "$GITHUB_OUTPUT"

      - name: Validate key-based credentials
        if: ${{ inputs.wif_provider == '' }}
        env:
          REG_CREDS: ${{ secrets.registry_credentials }}
          CLUSTER_CREDS: ${{ secrets.cluster_credentials }}
        run: |
          if [ -z "$REG_CREDS" ]; then
            echo "::error::wif_provider is empty (key-based auth) but registry_credentials is empty." >&2
            exit 1
          fi
          if [ -z "$CLUSTER_CREDS" ]; then
            echo "::error::wif_provider is empty (key-based auth) but cluster_credentials is empty." >&2
            exit 1
          fi

      # WIF path: one auth sets ADC for both the image check and the roll.
      - name: Authenticate to GCP via WIF
        if: ${{ inputs.wif_provider != '' }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ inputs.wif_provider }}
          service_account: ${{ inputs.service_account }}

      # Key path: activate the registry SA so the describe below can read GAR.
      - name: Authenticate to GAR (key-based)
        if: ${{ inputs.wif_provider == '' }}
        env:
          REG_CREDS: ${{ secrets.registry_credentials }}
        run: |
          KEY="$(mktemp)"; printf '%s' "$REG_CREDS" > "$KEY"
          gcloud auth activate-service-account --key-file="$KEY"
          rm -f "$KEY"

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Verify rollback image exists
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
        run: |
          if ! gcloud container images describe "$IMAGE" >/dev/null 2>&1; then
            echo "::error::rollback image not found in registry: $IMAGE" >&2
            echo "::error::refusing to roll a service onto an image that does not exist." >&2
            exit 1
          fi
          echo "::notice::rollback target verified: $IMAGE"

      # ---------- GKE roll ----------
      - name: Authenticate to GKE cluster (key-based)
        if: ${{ inputs.deploy_target == 'gke' && inputs.wif_provider == '' }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.cluster_credentials }}

      - name: Get GKE credentials
        if: ${{ inputs.deploy_target == 'gke' }}
        uses: google-github-actions/get-gke-credentials@3da1e46a907576cefaa90c484278bb5b259dd395 # v3.0.0
        with:
          cluster_name: ${{ inputs.cluster_name }}
          location: ${{ inputs.cluster_location }}
          project_id: ${{ inputs.cluster_project }}

      - name: Set up Helm
        if: ${{ inputs.deploy_target == 'gke' && inputs.deploy_method == 'helm' }}
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Roll GKE (kubectl)
        if: ${{ inputs.deploy_target == 'gke' && inputs.deploy_method == 'kubectl' }}
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
          SVC: ${{ inputs.svc_name }}
          NS: ${{ inputs.namespace }}
          WORKLOAD_TYPE: ${{ inputs.workload_type }}
          APP_VERSION: ${{ inputs.app_version }}
          COMMIT: ${{ inputs.commit_sha }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          case "$WORKLOAD_TYPE" in
            deployment) KIND=deployment ;;
            cron)       KIND=cronjob ;;
            *) echo "::error::workload_type must be 'deployment' or 'cron'" >&2; exit 1 ;;
          esac
          DR=()
          [ "$DRY_RUN" = "true" ] && DR=(--dry-run=client)
          kubectl set image "${KIND}/${SVC}" "${SVC}=${IMAGE}" --namespace "$NS" "${DR[@]}"
          # Stamp the live commit so forward-only stays accurate after the rollback.
          if [ -n "$COMMIT" ]; then
            kubectl annotate "${KIND}/${SVC}" "jgd.dev/commit=${COMMIT}" --overwrite --namespace "$NS" "${DR[@]}"
          fi
          if [ -n "$APP_VERSION" ] && [ "$KIND" = "deployment" ]; then
            kubectl set env "deployment/${SVC}" "APP_VERSION=${APP_VERSION}" --namespace "$NS" "${DR[@]}"
          fi

      - name: Roll GKE (helm)
        if: ${{ inputs.deploy_target == 'gke' && inputs.deploy_method == 'helm' }}
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
          RELEASE: ${{ inputs.helm_release != '' && inputs.helm_release || inputs.svc_name }}
          CHART: ${{ inputs.helm_chart }}
          NS: ${{ inputs.namespace }}
          VALUES: ${{ inputs.helm_values_path }}
          EXTRA: ${{ inputs.helm_extra_args }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ -z "$CHART" ]; then
            echo "::error::helm_chart is required when deploy_method=helm" >&2
            exit 1
          fi
          set -- helm upgrade --install "$RELEASE" "$CHART" \
            --namespace "$NS" --set image="$IMAGE"
          [ -n "$VALUES" ] && set -- "$@" --values "$VALUES"
          [ "$DRY_RUN" = "true" ] && set -- "$@" --dry-run
          # shellcheck disable=SC2086
          "$@" $EXTRA

      # ---------- Cloud Run roll ----------
      - name: Authenticate to Cloud Run (key-based)
        if: ${{ inputs.deploy_target == 'cloud-run' && inputs.wif_provider == '' }}
        env:
          CLUSTER_CREDS: ${{ secrets.cluster_credentials }}
        run: |
          KEY="$(mktemp)"; printf '%s' "$CLUSTER_CREDS" > "$KEY"
          gcloud auth activate-service-account --key-file="$KEY"
          rm -f "$KEY"

      - name: Roll Cloud Run
        if: ${{ inputs.deploy_target == 'cloud-run' }}
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
          RUN_PROJECT: ${{ inputs.run_project != '' && inputs.run_project || inputs.gar_project }}
          RUN_REGION: ${{ inputs.run_region != '' && inputs.run_region || inputs.gcp_region }}
          RUN_SERVICE: ${{ inputs.run_service }}
          COMMIT: ${{ inputs.commit_sha }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ -z "$RUN_SERVICE" ]; then
            echo "::error::run_service is required when deploy_target=cloud-run" >&2
            exit 1
          fi
          set -- gcloud run services update "$RUN_SERVICE" \
            --project "$RUN_PROJECT" --region "$RUN_REGION" \
            --image "$IMAGE" --quiet
          # Stamp the live commit (Cloud Run label; keys are slash-free).
          if [ -n "$COMMIT" ]; then
            set -- "$@" --update-labels "jgd_commit=${COMMIT}"
          fi
          if [ "$DRY_RUN" = "true" ]; then
            printf 'DRY RUN — would run:'; printf ' %q' "$@"; printf '\n'
            exit 0
          fi
          "$@"

      - name: Record GitHub Deployment (live-commit marker)
        if: ${{ inputs.record_github_deployment && inputs.environment != '' && inputs.commit_sha != '' && !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMIT: ${{ inputs.commit_sha }}
          ENVIRONMENT: ${{ inputs.environment }}
          IMAGE: ${{ steps.ref.outputs.image }}
          REASON: ${{ inputs.reason }}
        run: |
          # Best-effort audit record: the roll already happened, so a Deployments
          # API hiccup must NOT fail the rollback. Warn and move on.
          DESC="rollback to ${IMAGE}${REASON:+ — ${REASON}}"
          # required_contexts:[] forces creation regardless of the old commit's
          # status checks. Build the body with jq so DESC is safely escaped.
          BODY="$(jq -nc \
            --arg ref "$COMMIT" --arg env "$ENVIRONMENT" --arg desc "$DESC" \
            '{ref:$ref, environment:$env, description:$desc, auto_merge:false, required_contexts:[]}')"
          DEP_ID="$(printf '%s' "$BODY" | gh api "repos/${REPO}/deployments" --input - --jq '.id' 2>/dev/null || true)"
          if [ -z "$DEP_ID" ] || [ "$DEP_ID" = "null" ]; then
            echo "::warning::could not create GitHub Deployment (missing deployments: write, or API conflict); live-commit still stamped on the service." >&2
            exit 0
          fi
          gh api "repos/${REPO}/deployments/${DEP_ID}/statuses" \
            -f state=success -f environment="$ENVIRONMENT" -f description="$DESC" >/dev/null 2>&1 \
            || echo "::warning::deployment #${DEP_ID} created but status update failed." >&2
          echo "::notice::recorded GitHub Deployment #${DEP_ID} (${ENVIRONMENT} @ ${COMMIT})"

      - name: Summary
        if: ${{ always() }}
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
          TARGET_DESC: ${{ inputs.deploy_target }}
          ENVIRONMENT: ${{ inputs.environment }}
          COMMIT: ${{ inputs.commit_sha }}
          REASON: ${{ inputs.reason }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          {
            echo "## Rollback"
            echo ""
            echo "- Environment: \`${ENVIRONMENT}\`"
            echo "- Rolled onto: \`${IMAGE}\`${DRY_RUN:+ (dry run)}"
            echo "- Roll target: \`${TARGET_DESC}\`"
            echo "- Live commit: \`${COMMIT:-unknown (not stamped)}\`"
            echo "- Reason:      ${REASON:-—}"
            echo ""
            echo "> Transient bridge. Follow up with \`git revert\` + a new linear tag"
            echo "> through \`promote-image\` for the permanent, forward-only fix."
          } >> "$GITHUB_STEP_SUMMARY"
