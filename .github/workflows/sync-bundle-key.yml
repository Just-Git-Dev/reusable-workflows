name: Sync keys into Secret Manager bundle (reusable)

# Reusable `workflow_call` version of the rotate-db-redis-passwords /
# rotate-r2-token family. Upserts one or more keys into the app-secrets SM
# bundle, adds a new version, forces the given Cloud Run service(s) onto it, and
# disables the previous version.
#
# The key->value payload is passed as a single JSON secret (`payload_json`),
# where the JSON KEYS are the DESTINATION bundle keys. This absorbs both the
# count difference (2 keys for db/redis or r2) and the naming drift between apps
# (e.g. FILE_STORE_ACCESS_KEY vs FILE_STORAGE_ACCESS_KEY) without any per-org
# branches in this workflow. Build it in the caller with toJSON() so values stay
# masked, e.g.:
#   payload_json: |
#     {"DB_PASSWORD": ${{ toJSON(secrets.DB_PASSWORD) }},
#      "REDIS_PASSWORD": ${{ toJSON(secrets.REDIS_PASSWORD) }}}

on:
  workflow_call:
    inputs:
      gcp_project:
        type: string
        required: true
      gcp_region:
        type: string
        required: false
        default: 'asia-southeast1'
      wif_provider:
        type: string
        required: true
      service_account:
        type: string
        required: true
      bundle_secret:
        description: 'Secret Manager bundle secret name'
        type: string
        required: false
        default: 'app-secrets'
      mount_path:
        description: 'Container path the bundle is mounted at (e.g. /app/configs/.prod.env)'
        type: string
        required: false
        default: '/app/configs/.prod.env'
      services_csv:
        description: 'Comma-separated Cloud Run service names to roll onto the new version'
        type: string
        required: true
      title:
        description: 'Human label for the summary (e.g. "DB + Redis passwords")'
        type: string
        required: false
        default: 'secrets'
    secrets:
      payload_json:
        description: 'JSON object {DEST_BUNDLE_KEY: value, ...} — keys are destination bundle keys'
        required: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: secrets-rotation-${{ inputs.gcp_project }}-${{ inputs.bundle_secret }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GCP_PROJECT:   ${{ inputs.gcp_project }}
      GCP_REGION:    ${{ inputs.gcp_region }}
      BUNDLE_SECRET: ${{ inputs.bundle_secret }}
      MOUNT_PATH:    ${{ inputs.mount_path }}
      SERVICES_CSV:  ${{ inputs.services_csv }}

    steps:
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ inputs.wif_provider }}
          service_account:            ${{ inputs.service_account }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Validate payload
        env:
          PAYLOAD_JSON: ${{ secrets.payload_json }}
        run: |
          if ! printf '%s' "$PAYLOAD_JSON" | jq -e 'type == "object" and length > 0' >/dev/null 2>&1; then
            echo "::error::payload_json must be a non-empty JSON object of {DEST_KEY: value}."
            exit 1
          fi
          # Mask every value so nothing leaks in later logs.
          while IFS= read -r v; do
            [ -n "$v" ] && echo "::add-mask::$v"
          done < <(printf '%s' "$PAYLOAD_JSON" | jq -r '.[]')
          COUNT=$(printf '%s' "$PAYLOAD_JSON" | jq 'length')
          echo "Payload carries $COUNT key(s)."

      - name: Read current bundle (or start empty)
        id: cur
        run: |
          if ! gcloud secrets describe "$BUNDLE_SECRET" --project="$GCP_PROJECT" >/dev/null 2>&1; then
            echo "::error::Secret $BUNDLE_SECRET does not exist in $GCP_PROJECT. Run the org bootstrap first." && exit 1
          fi
          if gcloud secrets versions list "$BUNDLE_SECRET" --project="$GCP_PROJECT" --filter='state=ENABLED' --format='value(name)' | head -1 | grep -q .; then
            gcloud secrets versions access latest --secret="$BUNDLE_SECRET" --project="$GCP_PROJECT" > /tmp/bundle.env
            CURRENT_VERSION=$(gcloud secrets versions list "$BUNDLE_SECRET" --project="$GCP_PROJECT" --filter='state=ENABLED' --format='value(name)' | head -1)
            echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          else
            : > /tmp/bundle.env
          fi

      - name: Upsert payload keys into bundle
        env:
          PAYLOAD_JSON: ${{ secrets.payload_json }}
        run: |
          upsert() {
            local key="$1" val="$2"
            if grep -q "^${key}=" /tmp/bundle.env; then
              awk -v k="$key" -v v="$val" 'BEGIN{FS=OFS="="} $1==k{print k"="v; next} {print}' /tmp/bundle.env > /tmp/bundle.env.new
              mv /tmp/bundle.env.new /tmp/bundle.env
            else
              echo "${key}=${val}" >> /tmp/bundle.env
            fi
          }
          # Iterate DEST_KEY=value pairs from the JSON payload (base64 per value
          # so newlines/special chars survive the shell).
          while IFS=$'\t' read -r key b64; do
            val=$(printf '%s' "$b64" | base64 -d)
            upsert "$key" "$val"
          done < <(printf '%s' "$PAYLOAD_JSON" | jq -r 'to_entries[] | [.key, (.value | @base64)] | @tsv')

      - name: Add new bundle version
        id: new_version
        run: |
          gcloud secrets versions add "$BUNDLE_SECRET" \
            --project="$GCP_PROJECT" \
            --data-file=/tmp/bundle.env
          NEW_VERSION=$(gcloud secrets versions list "$BUNDLE_SECRET" --project="$GCP_PROJECT" --filter='state=ENABLED' --format='value(name)' --sort-by=~createTime | head -1)
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          rm -f /tmp/bundle.env /tmp/bundle.env.new

      - name: Force new Cloud Run revision(s)
        run: |
          IFS=',' read -ra SERVICES <<< "$SERVICES_CSV"
          for svc in "${SERVICES[@]}"; do
            svc="$(echo "$svc" | xargs)"   # trim whitespace
            [ -z "$svc" ] && continue
            gcloud run services update "$svc" \
              --region="$GCP_REGION" \
              --project="$GCP_PROJECT" \
              --update-secrets="${MOUNT_PATH}=${BUNDLE_SECRET}:latest" || \
              echo "::warning::Failed to update $svc"
          done

      - name: Disable old Secret Manager version
        if: steps.cur.outputs.current_version != ''
        run: |
          gcloud secrets versions disable "${{ steps.cur.outputs.current_version }}" \
            --secret="$BUNDLE_SECRET" \
            --project="$GCP_PROJECT" || true

      - name: Summary
        if: always()
        run: |
          {
            echo "## Synced ${{ inputs.title }} into $BUNDLE_SECRET (${GCP_PROJECT})"
            echo ""
            echo "- Old bundle version: ${{ steps.cur.outputs.current_version }} (disabled)"
            echo "- New bundle version: ${{ steps.new_version.outputs.new_version }}"
            echo "- Cloud Run services rolled: ${SERVICES_CSV}"
            echo "- Mount path: ${MOUNT_PATH}"
          } >> "$GITHUB_STEP_SUMMARY"
