name: Rotate a Cloudflare Worker signing secret (reusable)

# Rotates an HMAC signing secret shared between a Cloudflare Worker (which
# VERIFIES signed URLs) and a backend that SIGNS them from a Secret Manager
# bundle mounted into Cloud Run. The rotation is zero-downtime via a two-slot
# grace window: URLs already signed with the OLD secret keep verifying until
# they expire.
#
# Sequence:
#   1. generate a new secret (openssl rand -hex <secret_bytes>)
#   2. add it to the SM bundle under <bundle_key>, roll the Cloud Run service(s)
#      so the SIGNER starts emitting URLs signed with the new secret
#   3. set the Worker's PREVIOUS slot = old secret, PRIMARY slot = new secret,
#      so the VERIFIER accepts both during the overlap
#   4. wait grace_seconds (must be > your longest signed-URL TTL) for every
#      old-signed URL to expire
#   5. remove the PREVIOUS slot and disable the old SM version
#
# The Worker is expected to verify against PRIMARY, then fall back to PREVIOUS
# when set — the shape emitted by automahn-files-cdn:
#   ok = eq(hmac(env.PRIMARY, data), sig)
#        || (env.PREVIOUS && eq(hmac(env.PREVIOUS, data), sig))
#
# Overlaps sync-bundle-key on the SM-write + Cloud-Run-roll, but stays
# standalone: the CF two-slot push, the grace window, the delayed disable, and
# the roll-forward rollback all interleave around that write and can't be
# delegated without contorting the ordering. See DECISIONS 2026-07-13.
#
# Required IAM on service_account:
#   roles/secretmanager.secretVersionManager  (on bundle_secret)
#   roles/secretmanager.secretAccessor         (on bundle_secret)
#   roles/run.developer                        (on the target services)
# Plus a Cloudflare API token (secret) with Workers Scripts:Edit on the account.

on:
  workflow_call:
    inputs:
      gcp_project:
        description: 'GCP project id holding the bundle secret and the Cloud Run services.'
        type: string
        required: true
      gcp_region:
        description: 'Region of the Cloud Run services.'
        type: string
        required: false
        default: 'asia-southeast1'
      wif_provider:
        description: 'Workload Identity Federation provider resource name.'
        type: string
        required: true
      service_account:
        description: 'Service account email to impersonate via WIF.'
        type: string
        required: true
      bundle_secret:
        description: 'Secret Manager bundle secret name (dotenv blob mounted into Cloud Run).'
        type: string
        required: false
        default: 'app-secrets'
      bundle_key:
        description: 'Key inside the bundle to rotate (e.g. FILES_SIGNING_SECRET).'
        type: string
        required: true
      mount_path:
        description: 'Container path the bundle is mounted at.'
        type: string
        required: false
        default: '/app/configs/.prod.env'
      services_csv:
        description: 'Comma-separated Cloud Run service names to roll onto the new version.'
        type: string
        required: true
      cf_account_id:
        description: 'Cloudflare account id owning the Worker script.'
        type: string
        required: true
      cf_worker_script:
        description: 'Cloudflare Worker script name that verifies the signature.'
        type: string
        required: true
      cf_primary_secret_name:
        description: 'Worker secret binding for the current (primary) signing secret.'
        type: string
        required: true
      cf_previous_secret_name:
        description: 'Worker secret binding for the previous secret during grace. Blank = "<primary>_PREVIOUS".'
        type: string
        required: false
        default: ''
      grace_seconds:
        description: 'Seconds to keep the PREVIOUS slot live. MUST be > your longest signed-URL TTL.'
        type: number
        required: false
        default: 900
      secret_bytes:
        description: 'Byte length of the generated secret (hex-encoded, so the string is 2x this).'
        type: number
        required: false
        default: 32
      bootstrap:
        description: 'true = tolerate a missing bundle secret / missing services (first-run setup); no grace, no disable.'
        type: boolean
        required: false
        default: false
      dry_run:
        description: 'true = print the plan; generate nothing, write nothing, roll nothing.'
        type: boolean
        required: false
        default: false
    secrets:
      cloudflare_api_token:
        description: 'Cloudflare API token with Workers Scripts:Edit on cf_account_id.'
        required: true
    outputs:
      old_version:
        description: 'Bundle version enabled before this run (empty if none / bootstrap).'
        value: ${{ jobs.rotate.outputs.old_version }}
      new_version:
        description: 'Bundle version created by this run (empty on dry run).'
        value: ${{ jobs.rotate.outputs.new_version }}

permissions:
  contents: read
  id-token: write

concurrency:
  group: signing-rotation-${{ inputs.gcp_project }}-${{ inputs.bundle_secret }}-${{ inputs.bundle_key }}
  cancel-in-progress: false

jobs:
  rotate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    env:
      GCP_PROJECT:      ${{ inputs.gcp_project }}
      GCP_REGION:       ${{ inputs.gcp_region }}
      BUNDLE_SECRET:    ${{ inputs.bundle_secret }}
      BUNDLE_KEY:       ${{ inputs.bundle_key }}
      MOUNT_PATH:       ${{ inputs.mount_path }}
      SERVICES_CSV:     ${{ inputs.services_csv }}
      CF_ACCOUNT_ID:    ${{ inputs.cf_account_id }}
      CF_WORKER_SCRIPT: ${{ inputs.cf_worker_script }}
      CF_PRIMARY:       ${{ inputs.cf_primary_secret_name }}
      CF_PREVIOUS:      ${{ inputs.cf_previous_secret_name }}
      GRACE_SECONDS:    ${{ inputs.grace_seconds }}
      SECRET_BYTES:     ${{ inputs.secret_bytes }}
      BOOTSTRAP:        ${{ inputs.bootstrap }}
      DRY_RUN:          ${{ inputs.dry_run }}
    outputs:
      old_version: ${{ steps.cur.outputs.current_version }}
      new_version: ${{ steps.new_version.outputs.new_version }}

    steps:
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ inputs.wif_provider }}
          service_account:            ${{ inputs.service_account }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Resolve PREVIOUS slot name
        run: |
          if [ -z "$CF_PREVIOUS" ]; then
            echo "CF_PREVIOUS=${CF_PRIMARY}_PREVIOUS" >> "$GITHUB_ENV"
          fi

      - name: Generate new signing secret
        id: gen
        run: |
          # hex so it is safe in a dotenv value and a JSON string alike.
          NEW_SECRET=$(openssl rand -hex "$SECRET_BYTES")
          echo "::add-mask::$NEW_SECRET"
          echo "new_secret=$NEW_SECRET" >> "$GITHUB_OUTPUT"

      - name: Read current bundle (or start empty)
        id: cur
        run: |
          if ! gcloud secrets describe "$BUNDLE_SECRET" --project="$GCP_PROJECT" >/dev/null 2>&1; then
            if [ "$BOOTSTRAP" = "true" ]; then
              echo "::warning::Bundle $BUNDLE_SECRET absent — bootstrap run, starting empty."
              : > /tmp/bundle.env
              echo "empty=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::Secret $BUNDLE_SECRET does not exist in $GCP_PROJECT. Create it first, or set bootstrap: true."
            exit 1
          fi
          # --limit=1 (not | head -1): closing the pipe can SIGPIPE gcloud, which
          # under pipefail would fail the step.
          CURRENT_VERSION=$(gcloud secrets versions list "$BUNDLE_SECRET" \
            --project="$GCP_PROJECT" --filter='state=ENABLED' \
            --sort-by=~createTime --limit=1 --format='value(name)')
          if [ -z "$CURRENT_VERSION" ]; then
            : > /tmp/bundle.env
            echo "empty=true" >> "$GITHUB_OUTPUT"
            echo "No enabled version yet — starting from an empty bundle."
            exit 0
          fi
          gcloud secrets versions access "$CURRENT_VERSION" \
            --secret="$BUNDLE_SECRET" --project="$GCP_PROJECT" > /tmp/bundle.env
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "empty=false" >> "$GITHUB_OUTPUT"
          echo "Current enabled version: $CURRENT_VERSION"
          # The OLD signing secret becomes the Worker PREVIOUS slot during grace.
          OLD=$(grep "^${BUNDLE_KEY}=" /tmp/bundle.env | sed "s/^${BUNDLE_KEY}=//" || true)
          if [ -n "$OLD" ]; then
            echo "::add-mask::$OLD"
            echo "old_secret=$OLD" >> "$GITHUB_OUTPUT"
          fi

      - name: Replace the key in the bundle
        run: |
          if grep -q "^${BUNDLE_KEY}=" /tmp/bundle.env; then
            awk -v k="$BUNDLE_KEY" -v v="${{ steps.gen.outputs.new_secret }}" \
              'BEGIN{FS=OFS="="} $1==k{print k"="v; next} {print}' /tmp/bundle.env > /tmp/bundle.env.new
            mv /tmp/bundle.env.new /tmp/bundle.env
          else
            echo "${BUNDLE_KEY}=${{ steps.gen.outputs.new_secret }}" >> /tmp/bundle.env
          fi

      - name: Add new bundle version
        id: new_version
        if: inputs.dry_run == false
        run: |
          gcloud secrets versions add "$BUNDLE_SECRET" \
            --project="$GCP_PROJECT" --data-file=/tmp/bundle.env
          NEW_VERSION=$(gcloud secrets versions list "$BUNDLE_SECRET" \
            --project="$GCP_PROJECT" --filter='state=ENABLED' \
            --sort-by=~createTime --limit=1 --format='value(name)')
          if [ -z "$NEW_VERSION" ]; then
            echo "::error::Could not resolve the newly added version of $BUNDLE_SECRET."
            exit 1
          fi
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Force new Cloud Run revision(s)
        id: deploy_run
        if: inputs.dry_run == false
        run: |
          IFS=',' read -ra SERVICES <<< "$SERVICES_CSV"
          FAILED=()
          for svc in "${SERVICES[@]}"; do
            svc="${svc#"${svc%%[![:space:]]*}"}"   # ltrim
            svc="${svc%"${svc##*[![:space:]]}"}"   # rtrim
            [ -z "$svc" ] && continue
            if gcloud run services update "$svc" \
                --region="$GCP_REGION" --project="$GCP_PROJECT" \
                --update-secrets="${MOUNT_PATH}=${BUNDLE_SECRET}:latest"; then
              echo "rolled: $svc"
            elif [ "$BOOTSTRAP" = "true" ]; then
              echo "::warning::Failed to update $svc during bootstrap (may not exist yet) — continuing."
            else
              echo "::error::Failed to roll $svc — the signer did not adopt the new secret."
              FAILED+=("$svc")
            fi
          done
          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "::error::${#FAILED[@]} service(s) failed to roll: ${FAILED[*]}"
            exit 1
          fi

      # Order matters: the signer (Cloud Run) is already on the new secret above.
      # Now teach the verifier (Worker) to accept BOTH — old via PREVIOUS, new via
      # PRIMARY — before old-signed URLs stop being honoured.
      - name: Set Worker PREVIOUS slot = old secret
        if: inputs.dry_run == false && steps.cur.outputs.empty == 'false' && steps.cur.outputs.old_secret != ''
        env:
          CF_API_TOKEN: ${{ secrets.cloudflare_api_token }}
        run: |
          cat > /tmp/cf_secret.json <<EOF
          {"name": "${CF_PREVIOUS}", "text": "${{ steps.cur.outputs.old_secret }}", "type": "secret_text"}
          EOF
          # NOT curl -f: it swallows Cloudflare's JSON error body, so a 403 came
          # back with no error code. Capture status + body and surface both.
          HTTP=$(curl -sS -o /tmp/cf_resp.json -w '%{http_code}' -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${CF_WORKER_SCRIPT}/secrets" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @/tmp/cf_secret.json)
          rm -f /tmp/cf_secret.json
          if [ "$HTTP" -lt 200 ] || [ "$HTTP" -ge 300 ]; then
            echo "::error::CF Worker PUT (PREVIOUS slot) returned HTTP $HTTP"
            cat /tmp/cf_resp.json 2>/dev/null; echo
            exit 1
          fi
          echo "CF Worker PREVIOUS slot set (HTTP $HTTP)."

      - name: Set Worker PRIMARY slot = new secret
        if: inputs.dry_run == false
        env:
          CF_API_TOKEN: ${{ secrets.cloudflare_api_token }}
        run: |
          cat > /tmp/cf_secret.json <<EOF
          {"name": "${CF_PRIMARY}", "text": "${{ steps.gen.outputs.new_secret }}", "type": "secret_text"}
          EOF
          HTTP=$(curl -sS -o /tmp/cf_resp.json -w '%{http_code}' -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${CF_WORKER_SCRIPT}/secrets" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @/tmp/cf_secret.json)
          rm -f /tmp/cf_secret.json
          if [ "$HTTP" -lt 200 ] || [ "$HTTP" -ge 300 ]; then
            echo "::error::CF Worker PUT (PRIMARY slot) returned HTTP $HTTP"
            cat /tmp/cf_resp.json 2>/dev/null; echo
            exit 1
          fi
          echo "CF Worker PRIMARY slot set (HTTP $HTTP)."

      - name: Roll back the new SM version on failure
        # Fires ONLY when an earlier step failed AND the Cloud Run roll did NOT
        # succeed. In that window nothing consumes the new version yet, so it is
        # safe to revert `latest` to the previously-in-use content.
        #
        # Revert by ROLL-FORWARD, not by disabling the new version: `latest` always
        # points to the HIGHEST version number, so disabling it would leave `latest`
        # on a DISABLED version and break both `access latest` and Cloud Run's
        # `<secret>:latest` mount. Instead copy the prior content into a fresh
        # ENABLED version, then disable the bad new one (now safe — no longer newest).
        #
        # Deliberately NOT failure()-blanket: if the failure lands on a post-deploy
        # step (grace/cleanup/disable), the signer AND verifier are already on the
        # new secret, and reverting SM here would BREAK signing.
        if: >-
          failure()
          && inputs.dry_run == false
          && steps.new_version.outputs.new_version != ''
          && steps.cur.outputs.current_version != ''
          && steps.deploy_run.outcome != 'success'
        run: |
          echo "::warning::Rotation failed before the signer moved over — restoring ${BUNDLE_SECRET} latest to version ${{ steps.cur.outputs.current_version }}."
          gcloud secrets versions access "${{ steps.cur.outputs.current_version }}" \
            --secret="$BUNDLE_SECRET" --project="$GCP_PROJECT" > /tmp/rollback.env
          if [ ! -s /tmp/rollback.env ]; then
            echo "::error::Could not read previous version ${{ steps.cur.outputs.current_version }} — manual intervention needed."
            exit 1
          fi
          gcloud secrets versions add "$BUNDLE_SECRET" \
            --project="$GCP_PROJECT" --data-file=/tmp/rollback.env
          rm -f /tmp/rollback.env
          gcloud secrets versions disable "${{ steps.new_version.outputs.new_version }}" \
            --secret="$BUNDLE_SECRET" --project="$GCP_PROJECT" \
            || echo "::warning::Could not disable failed version ${{ steps.new_version.outputs.new_version }} (non-fatal — latest already restored)."

      - name: Grace period for outstanding URLs to expire
        if: inputs.dry_run == false && steps.cur.outputs.empty == 'false'
        run: sleep "$GRACE_SECONDS"

      - name: Remove Worker PREVIOUS slot
        if: inputs.dry_run == false && steps.cur.outputs.empty == 'false' && steps.cur.outputs.old_secret != ''
        env:
          CF_API_TOKEN: ${{ secrets.cloudflare_api_token }}
        run: |
          # Non-fatal: after grace the PREVIOUS slot is unused, so a failure here
          # doesn't break signing — but still show the CF body rather than swallow it.
          HTTP=$(curl -sS -o /tmp/cf_resp.json -w '%{http_code}' -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${CF_WORKER_SCRIPT}/secrets/${CF_PREVIOUS}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" || echo "000")
          if [ "$HTTP" -lt 200 ] || [ "$HTTP" -ge 300 ]; then
            echo "::warning::Removing PREVIOUS slot returned HTTP $HTTP (non-fatal):"
            cat /tmp/cf_resp.json 2>/dev/null; echo
          else
            echo "CF Worker PREVIOUS slot removed (HTTP $HTTP)."
          fi

      - name: Disable the old SM version
        if: inputs.dry_run == false && steps.cur.outputs.empty == 'false' && steps.cur.outputs.current_version != ''
        run: |
          gcloud secrets versions disable "${{ steps.cur.outputs.current_version }}" \
            --secret="$BUNDLE_SECRET" --project="$GCP_PROJECT" || true

      - name: Shred local bundle copies
        if: always()
        run: rm -f /tmp/bundle.env /tmp/bundle.env.new /tmp/rollback.env /tmp/cf_secret.json

      - name: Summary
        if: always()
        run: |
          {
            if [ "$DRY_RUN" = "true" ]; then
              echo "## [dry run] Would rotate ${BUNDLE_KEY} in ${BUNDLE_SECRET} (${GCP_PROJECT})"
              echo ""
              echo "- Current bundle version: ${{ steps.cur.outputs.current_version }} (would be disabled after grace)"
              echo "- Would roll: \`${SERVICES_CSV}\`"
              echo "- Would set Worker \`${CF_WORKER_SCRIPT}\` slots: ${CF_PRIMARY} (+ ${CF_PREVIOUS} during grace)"
            else
              echo "## Rotated ${BUNDLE_KEY} in ${BUNDLE_SECRET} (${GCP_PROJECT})"
              echo ""
              echo "- Empty/bootstrap: ${{ steps.cur.outputs.empty }}"
              echo "- Old version: ${{ steps.cur.outputs.current_version }} (disabled)"
              echo "- New version: ${{ steps.new_version.outputs.new_version }}"
              echo "- Cloud Run rolled: \`${SERVICES_CSV}\`"
              echo "- Worker: ${CF_WORKER_SCRIPT} (PRIMARY set; PREVIOUS held ${GRACE_SECONDS}s then removed)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
