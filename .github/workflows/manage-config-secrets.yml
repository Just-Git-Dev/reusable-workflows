name: Manage config & secrets (reusable)

# Manages the VALUES of a GKE service's non-sensitive config and its secrets.
# This workflow only WRITES values into their store — it does not deploy, roll,
# or wire anything into pods:
#
#   * ConfigMap  — transform a caller-committed config file (dotenv) into a
#                  ConfigMap and `kubectl apply` it. Two shapes:
#                    keyvalue      — one data entry per KEY (Go services)
#                    react-env-js  — a single `environment.js` with window.env
#                                    (React UIs that read config at runtime)
#   * Secrets    — materialize a masked JSON payload into ONE backend:
#                    k8s         — an Opaque Secret in the namespace
#                    gsm (blob)  — one Secret Manager secret, dotenv payload
#                    gsm (individual) — one Secret Manager secret per key
#                    eso         — RESERVED, not implemented (see TODO.md)
#
# WIRING IS OUT OF SCOPE. Getting a GSM-backed secret into a running pod (Secret
# Manager CSI driver + SecretProviderClass, or an ESO ExternalSecret) is a
# separate provisioning workflow — see TODO.md. The `eso` value is reserved here
# as the extension point for that counterpart.
#
# Why not zopsmart's generate-configmap: it hand-rolls YAML with `cut -d= -f2-`
# and unquoted `echo`, so any value containing `:` or a quote corrupts the
# document. `kubectl create ... --dry-run=client -o yaml | kubectl apply -f -`
# is the canonical, escaping-safe form and is what we use here.
#
# Config file lives in the caller's repo (non-sensitive). Secrets NEVER do — they
# arrive as a masked JSON payload built in the caller with toJSON():
#
#   payload_json: |
#     {"DB_PASSWORD": ${{ toJSON(secrets.DB_PASSWORD) }},
#      "API_KEY":     ${{ toJSON(secrets.API_KEY) }}}
#
# Required IAM on service_account:
#   ConfigMap / k8s secret : roles/container.developer (on the cluster)
#   gsm backend            : roles/secretmanager.admin  (create + add versions)

on:
  workflow_call:
    inputs:
      # --- GCP / auth: keyless WIF (preferred) OR a stored SA-JSON key ---
      # Provide EITHER wif_provider + service_account, OR the cluster_credentials
      # secret (GCP SA-JSON). WIF wins when both are set. The stored-key path is
      # for callers not yet onboarded to WIF (parity with deploy-cluster-keyed).
      wif_provider:
        description: 'WIF provider resource name. Empty ⇒ use the cluster_credentials SA key.'
        type: string
        required: false
        default: ''
      service_account:
        description: 'SA email to impersonate via WIF (with wif_provider).'
        type: string
        required: false
        default: ''
      gcp_project:
        description: 'GCP project for gsm secrets. Empty ⇒ cluster_project.'
        type: string
        required: false
        default: ''
      checkout_ref:
        description: 'Git ref to check out for the config file. Empty ⇒ the caller ref.'
        type: string
        required: false
        default: ''

      # --- Cluster (required when writing a ConfigMap or a k8s Secret) ---
      cluster_project:
        description: 'GCP project owning the GKE cluster.'
        type: string
        required: false
        default: ''
      cluster_name:
        description: 'GKE cluster name.'
        type: string
        required: false
        default: ''
      cluster_location:
        description: 'GKE cluster region or zone.'
        type: string
        required: false
        default: ''
      namespace:
        description: 'Kubernetes namespace for the ConfigMap / k8s Secret.'
        type: string
        required: false
        default: ''

      # --- ConfigMap (skipped when config_file is empty) ---
      config_file:
        description: 'Path (in the checkout) to a dotenv config file. Empty ⇒ no ConfigMap.'
        type: string
        required: false
        default: ''
      configmap_name:
        description: 'ConfigMap name. Required when config_file is set.'
        type: string
        required: false
        default: ''
      configmap_target:
        description: 'keyvalue (one entry per key) | react-env-js (single environment.js window.env).'
        type: string
        required: false
        default: 'keyvalue'

      # --- Secrets (skipped when secrets_backend is none) ---
      secrets_backend:
        description: 'none | k8s | gsm | eso (eso reserved, not implemented).'
        type: string
        required: false
        default: 'none'
      secret_name:
        description: 'k8s Secret name, or gsm blob secret name, or gsm individual name PREFIX.'
        type: string
        required: false
        default: ''
      gsm_mode:
        description: 'blob (one secret, dotenv payload) | individual (one secret per key). gsm backend only.'
        type: string
        required: false
        default: 'blob'
      gsm_locations:
        description: 'Comma-separated regions for user-managed replication. Empty ⇒ automatic. gsm backend only.'
        type: string
        required: false
        default: ''

      dry_run:
        description: 'true = validate + print the plan; write nothing.'
        type: boolean
        required: false
        default: false

    secrets:
      payload_json:
        description: 'JSON object {KEY: value, ...}. Required when secrets_backend is not none.'
        required: false
      cluster_credentials:
        description: 'GCP SA-JSON key. Required when wif_provider is empty (stored-key auth).'
        required: false

    outputs:
      configmap_written:
        description: 'true if a ConfigMap was applied (false on dry run or when skipped).'
        value: ${{ jobs.manage.outputs.configmap_written }}
      secret_keys:
        description: 'Number of secret keys materialized (0 when skipped).'
        value: ${{ jobs.manage.outputs.secret_keys }}

permissions:
  contents: read
  id-token: write

concurrency:
  group: manage-config-secrets-${{ inputs.cluster_name }}-${{ inputs.namespace }}-${{ inputs.configmap_name }}-${{ inputs.secret_name }}
  cancel-in-progress: false

jobs:
  manage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    env:
      GCP_PROJECT:      ${{ inputs.gcp_project != '' && inputs.gcp_project || inputs.cluster_project }}
      CLUSTER_PROJECT:  ${{ inputs.cluster_project }}
      CLUSTER_NAME:     ${{ inputs.cluster_name }}
      CLUSTER_LOCATION: ${{ inputs.cluster_location }}
      NAMESPACE:        ${{ inputs.namespace }}
      CONFIG_FILE:      ${{ inputs.config_file }}
      CONFIGMAP_NAME:   ${{ inputs.configmap_name }}
      CONFIGMAP_TARGET: ${{ inputs.configmap_target }}
      SECRETS_BACKEND:  ${{ inputs.secrets_backend }}
      SECRET_NAME:      ${{ inputs.secret_name }}
      GSM_MODE:         ${{ inputs.gsm_mode }}
      GSM_LOCATIONS:    ${{ inputs.gsm_locations }}
      DRY_RUN:          ${{ inputs.dry_run }}
    outputs:
      configmap_written: ${{ steps.configmap.outputs.written }}
      secret_keys: ${{ steps.secrets.outputs.keys }}

    steps:
      - name: Validate inputs
        env:
          HAS_PAYLOAD: ${{ secrets.payload_json != '' }}
          HAS_CREDS: ${{ secrets.cluster_credentials != '' }}
          WIF_PROVIDER: ${{ inputs.wif_provider }}
          SERVICE_ACCOUNT: ${{ inputs.service_account }}
        run: |
          # Auth: WIF (provider + SA) OR a stored SA-JSON key. Exactly one path.
          if [ -n "$WIF_PROVIDER" ]; then
            [ -n "$SERVICE_ACCOUNT" ] || { echo "::error::service_account is required with wif_provider."; exit 1; }
          elif [ "$HAS_CREDS" != "true" ]; then
            echo "::error::provide wif_provider + service_account, or the cluster_credentials secret."
            exit 1
          fi

          # A ConfigMap or a k8s Secret touches the cluster; require cluster inputs.
          needs_cluster=false
          [ -n "$CONFIG_FILE" ] && needs_cluster=true
          [ "$SECRETS_BACKEND" = "k8s" ] && needs_cluster=true
          if [ "$needs_cluster" = "true" ]; then
            miss=""
            [ -z "$CLUSTER_PROJECT" ] && miss="$miss cluster_project"
            [ -z "$CLUSTER_NAME" ] && miss="$miss cluster_name"
            [ -z "$CLUSTER_LOCATION" ] && miss="$miss cluster_location"
            [ -z "$NAMESPACE" ] && miss="$miss namespace"
            if [ -n "$miss" ]; then
              echo "::error::ConfigMap / k8s secret needs cluster inputs; missing:$miss"
              exit 1
            fi
          fi

          if [ -n "$CONFIG_FILE" ]; then
            [ -z "$CONFIGMAP_NAME" ] && { echo "::error::configmap_name is required when config_file is set."; exit 1; }
            case "$CONFIGMAP_TARGET" in
              keyvalue|react-env-js) ;;
              *) echo "::error::configmap_target must be keyvalue or react-env-js."; exit 1 ;;
            esac
          fi

          case "$SECRETS_BACKEND" in
            none) ;;
            eso)
              echo "::error::secrets_backend 'eso' is reserved and not implemented yet — see TODO.md."
              exit 1 ;;
            k8s|gsm)
              [ "$HAS_PAYLOAD" = "true" ] || { echo "::error::secrets_backend=$SECRETS_BACKEND requires secrets.payload_json."; exit 1; }
              [ -z "$SECRET_NAME" ] && { echo "::error::secret_name is required for secrets_backend=$SECRETS_BACKEND."; exit 1; }
              if [ "$SECRETS_BACKEND" = "gsm" ]; then
                case "$GSM_MODE" in blob|individual) ;; *) echo "::error::gsm_mode must be blob or individual."; exit 1 ;; esac
              fi ;;
            *) echo "::error::secrets_backend must be none, k8s, gsm, or eso."; exit 1 ;;
          esac
          echo "Validation OK (cluster_needed=$needs_cluster, backend=$SECRETS_BACKEND)."

      - name: Checkout (for config file)
        if: ${{ inputs.config_file != '' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Authenticate to GCP via WIF
        if: ${{ inputs.wif_provider != '' }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ inputs.wif_provider }}
          service_account: ${{ inputs.service_account }}

      - name: Authenticate to GCP via stored key
        if: ${{ inputs.wif_provider == '' }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.cluster_credentials }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Get GKE credentials
        if: ${{ inputs.config_file != '' || inputs.secrets_backend == 'k8s' }}
        uses: google-github-actions/get-gke-credentials@3da1e46a907576cefaa90c484278bb5b259dd395 # v3.0.0
        with:
          cluster_name: ${{ inputs.cluster_name }}
          location: ${{ inputs.cluster_location }}
          project_id: ${{ inputs.cluster_project }}

      - name: Apply ConfigMap
        id: configmap
        if: ${{ inputs.config_file != '' }}
        run: |
          echo "written=false" >> "$GITHUB_OUTPUT"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "::error::config_file not found: $CONFIG_FILE"
            exit 1
          fi

          if [ "$CONFIGMAP_TARGET" = "react-env-js" ]; then
            # Build environment.js (window.env) with JSON-quoted values so any
            # character in a value survives. jq does the escaping.
            {
              echo "if (typeof window !== 'undefined')"
              echo "  window.env = {"
              # dotenv -> JSON object -> "  KEY: <json-string>," lines
              grep -vE '^\s*(#|$)' "$CONFIG_FILE" \
                | sed 's/^\([^=]*\)=\(.*\)$/\1\t\2/' \
                | while IFS=$'\t' read -r k v; do
                    printf '    %s: %s,\n' "$k" "$(printf '%s' "$v" | jq -R -s '.')"
                  done
              echo "  }"
            } > /tmp/environment.js
            echo "Generated environment.js:"; cat /tmp/environment.js
            SRC=(--from-file=environment.js=/tmp/environment.js)
          else
            # keyvalue: kubectl parses the dotenv itself (ignores blanks/#), and
            # escapes values into the ConfigMap data map.
            SRC=(--from-env-file="$CONFIG_FILE")
          fi

          kubectl create configmap "$CONFIGMAP_NAME" "${SRC[@]}" \
            --dry-run=client -o yaml > /tmp/configmap.yaml
          echo "----- ConfigMap manifest -----"; cat /tmp/configmap.yaml

          if [ "$DRY_RUN" = "true" ]; then
            echo "[dry run] would apply ConfigMap $CONFIGMAP_NAME to ns/$NAMESPACE"
          else
            kubectl apply -f /tmp/configmap.yaml -n "$NAMESPACE"
            echo "written=true" >> "$GITHUB_OUTPUT"
          fi
          rm -f /tmp/environment.js /tmp/configmap.yaml

      - name: Materialize secrets
        id: secrets
        if: ${{ inputs.secrets_backend == 'k8s' || inputs.secrets_backend == 'gsm' }}
        env:
          PAYLOAD_JSON: ${{ secrets.payload_json }}
        run: |
          echo "keys=0" >> "$GITHUB_OUTPUT"
          # Validate payload is a non-empty object of string values, and mask them.
          if ! printf '%s' "$PAYLOAD_JSON" | jq -e 'type=="object" and length>0' >/dev/null 2>&1; then
            echo "::error::payload_json must be a non-empty JSON object of {KEY: value}."; exit 1
          fi
          if ! printf '%s' "$PAYLOAD_JSON" | jq -e 'all(.[]; type=="string")' >/dev/null 2>&1; then
            echo "::error::every payload_json value must be a string."; exit 1
          fi
          while IFS= read -r v; do [ -n "$v" ] && echo "::add-mask::$v"; done \
            < <(printf '%s' "$PAYLOAD_JSON" | jq -r '.[]')
          COUNT=$(printf '%s' "$PAYLOAD_JSON" | jq 'length')

          # Write a dotenv file from the payload (base64 per value so newlines /
          # special chars survive the shell round-trip).
          umask 077
          : > /tmp/secret.env
          while IFS=$'\t' read -r key b64; do
            val=$(printf '%s' "$b64" | base64 -d)
            printf '%s=%s\n' "$key" "$val" >> /tmp/secret.env
          done < <(printf '%s' "$PAYLOAD_JSON" | jq -r 'to_entries[] | [.key, (.value|@base64)] | @tsv')

          if [ "$SECRETS_BACKEND" = "k8s" ]; then
            kubectl create secret generic "$SECRET_NAME" \
              --from-env-file=/tmp/secret.env --dry-run=client -o yaml > /tmp/secret.yaml
            if [ "$DRY_RUN" = "true" ]; then
              echo "[dry run] would apply Secret $SECRET_NAME ($COUNT keys) to ns/$NAMESPACE"
            else
              kubectl apply -f /tmp/secret.yaml -n "$NAMESPACE"
            fi
          else
            # gsm: automatic replication unless gsm_locations given.
            REPL=(--replication-policy=automatic)
            [ -n "$GSM_LOCATIONS" ] && REPL=(--replication-policy=user-managed --locations="$GSM_LOCATIONS")
            ensure_secret() {
              local name="$1"
              if ! gcloud secrets describe "$name" --project="$GCP_PROJECT" >/dev/null 2>&1; then
                if [ "$DRY_RUN" = "true" ]; then echo "[dry run] would create GSM secret $name"; return; fi
                gcloud secrets create "$name" --project="$GCP_PROJECT" "${REPL[@]}"
              fi
            }
            if [ "$GSM_MODE" = "blob" ]; then
              ensure_secret "$SECRET_NAME"
              if [ "$DRY_RUN" = "true" ]; then
                echo "[dry run] would add version to GSM blob $SECRET_NAME ($COUNT keys)"
              else
                gcloud secrets versions add "$SECRET_NAME" --project="$GCP_PROJECT" --data-file=/tmp/secret.env
              fi
            else
              # individual: one secret per key, named <prefix><KEY>.
              while IFS=$'\t' read -r key b64; do
                name="${SECRET_NAME}${key}"
                ensure_secret "$name"
                if [ "$DRY_RUN" = "true" ]; then
                  echo "[dry run] would add version to GSM secret $name"
                else
                  printf '%s' "$b64" | base64 -d | gcloud secrets versions add "$name" \
                    --project="$GCP_PROJECT" --data-file=-
                fi
              done < <(printf '%s' "$PAYLOAD_JSON" | jq -r 'to_entries[] | [.key, (.value|@base64)] | @tsv')
            fi
          fi
          echo "keys=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Shred local secret copy
        if: ${{ always() }}
        run: rm -f /tmp/secret.env /tmp/secret.yaml

      - name: Summary
        if: ${{ always() }}
        env:
          CONFIGMAP_WRITTEN: ${{ steps.configmap.outputs.written }}
          SECRET_KEYS: ${{ steps.secrets.outputs.keys }}
        run: |
          {
            echo "## Manage config & secrets${DRY_RUN:+ (dry run)}"
            echo ""
            if [ -n "$CONFIG_FILE" ]; then
              echo "- ConfigMap: \`$CONFIGMAP_NAME\` ($CONFIGMAP_TARGET) → ns \`$NAMESPACE\` — applied: ${CONFIGMAP_WRITTEN:-false}"
            else
              echo "- ConfigMap: skipped"
            fi
            case "$SECRETS_BACKEND" in
              none) echo "- Secrets: skipped" ;;
              k8s)  echo "- Secrets: k8s Secret \`$SECRET_NAME\` → ns \`$NAMESPACE\` — keys: ${SECRET_KEYS:-0}" ;;
              gsm)  echo "- Secrets: GSM ($GSM_MODE) \`$SECRET_NAME\` in \`$GCP_PROJECT\` — keys: ${SECRET_KEYS:-0}" ;;
            esac
          } >> "$GITHUB_STEP_SUMMARY"
