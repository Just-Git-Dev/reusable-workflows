name: Bootstrap Cloud Monitoring alerts (reusable)

# Applies a Cloud Monitoring notification channel + alert policies from the
# CALLER repo's alerts directory (this workflow checks out the caller, so each
# project keeps its own policy files). Idempotent: existing channels/policies
# matched by displayName are skipped unless force_update=true.
#
# Policy files may contain the literal token NOTIFICATION_CHANNEL_PLACEHOLDER,
# which is substituted with the resolved channel resource name before apply.
#
# Required IAM on service_account:
#   roles/monitoring.alertPolicyEditor
#   roles/monitoring.notificationChannelEditor

on:
  workflow_call:
    inputs:
      gcp_project:
        description: 'GCP project id the alert policies belong to.'
        type: string
        required: true
      wif_provider:
        description: >-
          Workload Identity Federation provider resource name, e.g.
          projects/123456789/locations/global/workloadIdentityPools/POOL/providers/PROVIDER
        type: string
        required: true
      service_account:
        description: 'Service account email to impersonate via WIF.'
        type: string
        required: true
      alerts_dir:
        description: 'Directory in the caller repo holding the channel file and the policy files.'
        type: string
        required: false
        default: 'infra/alerts'
      channel_file:
        description: 'Notification-channel definition file, relative to alerts_dir.'
        type: string
        required: false
        default: 'email-channel.yaml'
      policy_glob:
        description: 'Glob matching the alert-policy files, relative to alerts_dir.'
        type: string
        required: false
        default: 'policy-*.yaml'
      force_update:
        description: 'Replace existing policies instead of skipping them (destructive).'
        type: boolean
        required: false
        default: false
    outputs:
      channel_name:
        description: 'Resolved notification-channel resource name.'
        value: ${{ jobs.apply.outputs.channel_name }}
      policies_created:
        description: 'Number of alert policies created.'
        value: ${{ jobs.apply.outputs.created }}
      policies_updated:
        description: 'Number of alert policies updated (force_update only).'
        value: ${{ jobs.apply.outputs.updated }}
      policies_skipped:
        description: 'Number of alert policies left untouched because they already existed.'
        value: ${{ jobs.apply.outputs.skipped }}
      policies_failed:
        description: 'Number of alert policies that failed to apply (the run also exits non-zero).'
        value: ${{ jobs.apply.outputs.failed }}

permissions:
  contents: read
  id-token: write

concurrency:
  group: bootstrap-alerts-${{ inputs.gcp_project }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        # An explicit `shell: bash` runs scripts with `-eo pipefail`. The
        # implicit default is only `-e`, which lets a failing head-of-pipe pass.
        shell: bash
    env:
      GCP_PROJECT:  ${{ inputs.gcp_project }}
      ALERTS_DIR:   ${{ inputs.alerts_dir }}
      CHANNEL_FILE: ${{ inputs.channel_file }}
      POLICY_GLOB:  ${{ inputs.policy_glob }}
    outputs:
      channel_name: ${{ steps.channel.outputs.name }}
      created: ${{ steps.policies.outputs.created }}
      updated: ${{ steps.policies.outputs.updated }}
      skipped: ${{ steps.policies.outputs.skipped }}
      failed: ${{ steps.policies.outputs.failed }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ inputs.wif_provider }}
          service_account:            ${{ inputs.service_account }}

      - name: Set up gcloud (with alpha)
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        with:
          install_components: 'alpha'

      - name: Ensure notification channel
        id: channel
        run: |
          CHANNEL_PATH="${ALERTS_DIR}/${CHANNEL_FILE}"
          if [ ! -f "$CHANNEL_PATH" ]; then
            echo "::error::Channel file not found: $CHANNEL_PATH"
            exit 1
          fi

          # Single-process extraction: `grep ... | head -1` can SIGPIPE grep,
          # which under `pipefail` would fail the step.
          DISPLAY=$(awk '/^displayName:/ { sub(/^displayName:[[:space:]]*/, ""); print; exit }' "$CHANNEL_PATH")
          if [ -z "$DISPLAY" ]; then
            echo "::error::No displayName found in $CHANNEL_PATH"
            exit 1
          fi

          NAME=$(gcloud alpha monitoring channels list \
            --project="$GCP_PROJECT" \
            --filter="displayName=\"$DISPLAY\"" \
            --limit=1 --format='value(name)')

          if [ -z "$NAME" ]; then
            NAME=$(gcloud alpha monitoring channels create \
              --project="$GCP_PROJECT" \
              --channel-content-from-file="$CHANNEL_PATH" \
              --format='value(name)')
            echo "::notice::Created notification channel: $NAME"
          else
            echo "::notice::Notification channel exists: $NAME"
          fi

          # A create that exits 0 but prints nothing would otherwise be
          # substituted into every policy as an empty notification channel.
          if [ -z "$NAME" ]; then
            echo "::error::Resolved an empty channel name for '$DISPLAY'. Refusing to apply policies."
            exit 1
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Apply alert policies
        id: policies
        env:
          CHANNEL_NAME: ${{ steps.channel.outputs.name }}
          FORCE_UPDATE: ${{ inputs.force_update }}
        run: |
          # Without nullglob an unmatched glob is passed through literally and
          # the loop body runs once against a filename that does not exist.
          shopt -s nullglob
          # SC2206: POLICY_GLOB is deliberately unquoted — it *is* the glob.
          # shellcheck disable=SC2206
          FILES=("${ALERTS_DIR}"/${POLICY_GLOB})
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "::error::No policy files matched ${ALERTS_DIR}/${POLICY_GLOB}"
            exit 1
          fi

          CREATED=0; UPDATED=0; SKIPPED=0; FAILED=0
          FAILED_NAMES=()
          for f in "${FILES[@]}"; do
            DISPLAY=$(awk '/^displayName:/ { sub(/^displayName:[[:space:]]*/, ""); print; exit }' "$f")
            if [ -z "$DISPLAY" ]; then
              echo "::error::No displayName found in $f"
              exit 1
            fi

            EXISTING=$(gcloud alpha monitoring policies list \
              --project="$GCP_PROJECT" \
              --filter="displayName=\"$DISPLAY\"" \
              --limit=1 --format='value(name)')

            TMP=$(mktemp)
            sed "s|NOTIFICATION_CHANNEL_PLACEHOLDER|${CHANNEL_NAME}|g" "$f" > "$TMP"

            # Isolate each policy: a single invalid file (e.g. a bad condition
            # filter) is reported and counted, but does NOT abort the loop, so
            # every valid policy still applies. The step still exits non-zero at
            # the end if anything failed — the pass/fail contract is unchanged,
            # only the blast radius and the reporting improve.
            if [ -n "$EXISTING" ]; then
              if [ "$FORCE_UPDATE" = "true" ]; then
                if gcloud alpha monitoring policies update "$EXISTING" \
                    --project="$GCP_PROJECT" \
                    --policy-from-file="$TMP" --quiet; then
                  echo "  updated: $DISPLAY"
                  UPDATED=$((UPDATED + 1))
                else
                  echo "::error::update failed: $DISPLAY (in $f)"
                  FAILED=$((FAILED + 1)); FAILED_NAMES+=("$DISPLAY")
                fi
              else
                echo "  skipped (exists): $DISPLAY"
                SKIPPED=$((SKIPPED + 1))
              fi
            else
              if gcloud alpha monitoring policies create \
                  --project="$GCP_PROJECT" \
                  --policy-from-file="$TMP" --quiet; then
                echo "  created: $DISPLAY"
                CREATED=$((CREATED + 1))
              else
                echo "::error::create failed: $DISPLAY (in $f)"
                FAILED=$((FAILED + 1)); FAILED_NAMES+=("$DISPLAY")
              fi
            fi
            rm -f "$TMP"
          done

          {
            echo "created=$CREATED"
            echo "updated=$UPDATED"
            echo "skipped=$SKIPPED"
            echo "failed=$FAILED"
          } >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::${FAILED} policy/policies failed to apply: ${FAILED_NAMES[*]}. ${CREATED} created, ${UPDATED} updated, ${SKIPPED} skipped."
            exit 1
          fi

      - name: Summary
        if: always()
        env:
          CHANNEL_NAME: ${{ steps.channel.outputs.name }}
          CREATED:      ${{ steps.policies.outputs.created }}
          UPDATED:      ${{ steps.policies.outputs.updated }}
          SKIPPED:      ${{ steps.policies.outputs.skipped }}
          FAILED:       ${{ steps.policies.outputs.failed }}
        run: |
          {
            echo "## Monitoring alert policies — ${GCP_PROJECT}"
            echo ''
            echo "- Notification channel: ${CHANNEL_NAME:-<unresolved>}"
            echo "- Policies from: ${ALERTS_DIR}/${POLICY_GLOB}"
            echo "- Created: ${CREATED:-0} · Updated: ${UPDATED:-0} · Skipped: ${SKIPPED:-0} · Failed: ${FAILED:-0}"
            echo ""
            echo "Edit the YAML files and re-run to add new policies. Use \`force_update: true\` to overwrite existing ones."
          } >> "$GITHUB_STEP_SUMMARY"
