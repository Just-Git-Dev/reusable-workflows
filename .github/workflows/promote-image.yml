# Reusable image promote: retag an already-built image WITHOUT rebuilding, then
# roll the target service onto it.
#
# This is the Just-Git-Dev equivalent of `zopsmart/workflows` prod-deploy: a
# stage pipeline builds & pushes  image:<sha>, and this workflow retags that
# exact image  :<sha> -> :<release>  in Artifact Registry (server-side, via
# `gcloud container images add-tag` — no pull/push of layers) and rolls prod.
# Because nothing is rebuilt, prod is guaranteed to run the identical bytes that
# stage tested.
#
# Auth: keyless WIF (set wif_provider + service_account) is preferred. When
# wif_provider is empty, falls back to KEY-BASED auth — the retag uses the
# registry_credentials SA-key JSON and the roll uses the cluster_credentials
# SA-key JSON (the interim path for callers not yet federated).
#
# Roll targets:
#   none       — retag only (a later job/deploy consumes `outputs.image`).
#   gke        — `kubectl set image` / `helm upgrade` onto the promoted tag.
#   cloud-run  — `gcloud run services update --image` onto the promoted tag.
name: promote-image

on:
  workflow_call:
    inputs:
      gcp_region:
        description: >-
          Region of the Artifact Registry host (…-docker.pkg.dev). Used to derive
          the host when image_registry is empty, and as the Cloud Run region
          default.
        type: string
        required: true
      image_registry:
        description: >-
          Full Artifact Registry host (e.g. us-central1-docker.pkg.dev). Empty ⇒
          derived as `<gcp_region>-docker.pkg.dev`. Set this to point at the exact
          same host the stage build pushed to, decoupled from gcp_region.
        type: string
        required: false
        default: ''
      gar_project:
        description: 'GCP project owning the Artifact Registry repo.'
        type: string
        required: true
      gar_repo:
        description: 'Artifact Registry repository name.'
        type: string
        required: true
      image_name:
        description: 'Image name within the GAR repo (may contain slashes, e.g. staging/api).'
        type: string
        required: true
      source_tag:
        description: 'Existing tag to promote FROM (usually the stage commit SHA).'
        type: string
        required: true
      target_tag:
        description: 'Tag to promote TO. Empty ⇒ the triggering ref name (e.g. the pushed git tag).'
        type: string
        required: false
        default: ''
      require_semver:
        description: 'Reject a target_tag that is not vX.Y.Z.'
        type: boolean
        required: false
        default: true
      also_tag_latest:
        description: 'Also move :latest onto the promoted image.'
        type: boolean
        required: false
        default: false
      wif_provider:
        description: >-
          Workload Identity Federation provider resource name. Empty ⇒ KEY-BASED
          auth: the retag uses the `registry_credentials` SA-key JSON secret and
          the roll uses the `cluster_credentials` SA-key JSON secret.
        type: string
        required: false
        default: ''
      service_account:
        description: 'Service account email to impersonate via WIF (WIF path only).'
        type: string
        required: false
        default: ''
      deploy_target:
        description: 'none | gke | cloud-run — what to roll after retagging.'
        type: string
        required: false
        default: 'none'
      # --- gke roll (deploy_target=gke) ---
      cluster_project:
        description: 'GCP project owning the GKE cluster.'
        type: string
        required: false
        default: ''
      cluster_name:
        description: 'GKE cluster name.'
        type: string
        required: false
        default: ''
      cluster_location:
        description: 'GKE cluster region or zone.'
        type: string
        required: false
        default: ''
      namespace:
        description: 'Kubernetes namespace.'
        type: string
        required: false
        default: ''
      svc_name:
        description: 'Workload AND container name (kubectl set image sets svc=image).'
        type: string
        required: false
        default: ''
      workload_type:
        description: 'deployment | cron.'
        type: string
        required: false
        default: 'deployment'
      deploy_method:
        description: 'kubectl | helm.'
        type: string
        required: false
        default: 'kubectl'
      helm_chart:
        description: 'Chart reference (required when deploy_method=helm).'
        type: string
        required: false
        default: ''
      helm_release:
        description: 'Helm release name. Defaults to svc_name.'
        type: string
        required: false
        default: ''
      helm_values_path:
        description: 'Path to a Helm values file.'
        type: string
        required: false
        default: ''
      helm_extra_args:
        description: 'Extra args appended to `helm upgrade`.'
        type: string
        required: false
        default: ''
      app_version:
        description: 'When set (kubectl/deployment), `kubectl set env APP_VERSION=…` after the roll.'
        type: string
        required: false
        default: ''
      # --- cloud-run roll (deploy_target=cloud-run) ---
      run_project:
        description: 'GCP project owning the Cloud Run service. Defaults to gar_project.'
        type: string
        required: false
        default: ''
      run_region:
        description: 'Cloud Run region. Defaults to gcp_region.'
        type: string
        required: false
        default: ''
      run_service:
        description: 'Cloud Run service name.'
        type: string
        required: false
        default: ''
      commit_sha:
        description: >-
          Source commit of the promoted image, stamped onto the service (Cloud Run
          label / GKE annotation) and recorded as this env's live commit so
          forward-only stays accurate. Empty ⇒ falls back to the triggering commit
          (github.sha), which for a tag-triggered promote is the released commit.
        type: string
        required: false
        default: ''
      environment:
        description: >-
          Environment name (e.g. production). When set, records a GitHub Deployment
          marking this env's live commit. Empty ⇒ no Deployment record (the service
          label/annotation is still stamped).
        type: string
        required: false
        default: ''
      record_github_deployment:
        description: 'Record a GitHub Deployment (needs `environment` set + `deployments: write`).'
        type: boolean
        required: false
        default: true
      enforce_forward_only:
        description: >-
          Reject a promotion whose commit is BEHIND the environment's current live
          commit (an out-of-order / older release). Reads the live commit from the
          latest successful GitHub Deployment for `environment`, compares via the
          GitHub compare API, and blocks only when the candidate is strictly behind
          ("block iff behind" — allows ahead/diverged/identical). Requires
          `environment`. Opt-in (default off) — these workflows run in others' prod.
        type: boolean
        required: false
        default: false
      timeout_minutes:
        description: 'Job timeout.'
        type: number
        required: false
        default: 15
      dry_run:
        description: 'Print the retag + roll commands without executing them.'
        type: boolean
        required: false
        default: false
    secrets:
      registry_credentials:
        description: >-
          GCP SA-key JSON used to authenticate the server-side retag
          (`gcloud container images add-tag`). Required when `wif_provider` is
          empty (key-based auth); ignored on the WIF path.
        required: false
      cluster_credentials:
        description: >-
          GCP SA-key JSON used to authenticate the roll (GKE/Cloud Run). Required
          when `wif_provider` is empty and `deploy_target` != none; ignored on the
          WIF path. May be the same key as `registry_credentials`.
        required: false
    outputs:
      image:
        description: 'Fully-qualified promoted image reference (…:<target_tag>).'
        value: ${{ jobs.promote.outputs.image }}

permissions:
  contents: read
  id-token: write
  deployments: write

concurrency:
  # Per-environment when `environment` is set — same key scheme as rollback-service,
  # so a promote and a rollback for one env are mutually exclusive. Falls back to
  # the legacy per-target_tag key for callers not using `environment` (unchanged
  # behaviour for them).
  group: deploy-${{ inputs.gar_project }}-${{ inputs.image_name }}-${{ inputs.environment != '' && inputs.environment || inputs.target_tag }}
  cancel-in-progress: false

jobs:
  promote:
    name: retag${{ inputs.deploy_target != 'none' && format(' · roll {0}', inputs.deploy_target) || '' }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    outputs:
      image: ${{ steps.ref.outputs.image }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Resolve + validate tags
        id: ref
        env:
          REGION: ${{ inputs.gcp_region }}
          IN_REGISTRY: ${{ inputs.image_registry }}
          GAR_PROJECT: ${{ inputs.gar_project }}
          GAR_REPO: ${{ inputs.gar_repo }}
          IMAGE_NAME: ${{ inputs.image_name }}
          SOURCE_TAG: ${{ inputs.source_tag }}
          IN_TARGET: ${{ inputs.target_tag }}
          REQUIRE_SEMVER: ${{ inputs.require_semver }}
        run: |
          HOST="${IN_REGISTRY:-${REGION}-docker.pkg.dev}"
          BASE="${HOST}/${GAR_PROJECT}/${GAR_REPO}/${IMAGE_NAME}"
          TARGET="${IN_TARGET:-$GITHUB_REF_NAME}"

          if [ -z "$SOURCE_TAG" ]; then
            echo "::error::source_tag is empty — nothing to promote from." >&2
            exit 1
          fi
          if [ -z "$TARGET" ]; then
            echo "::error::target_tag is empty and no ref name is available." >&2
            exit 1
          fi
          if [ "$REQUIRE_SEMVER" = "true" ] && ! printf '%s' "$TARGET" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::target_tag '$TARGET' is not vX.Y.Z (set require_semver: false to allow)." >&2
            exit 1
          fi

          {
            echo "base=$BASE"
            echo "source=${BASE}:${SOURCE_TAG}"
            echo "image=${BASE}:${TARGET}"
            echo "target_tag=$TARGET"
          } >> "$GITHUB_OUTPUT"

      # Forward-only: reject an out-of-order (older) release before any mutation.
      # Uses github.token only (no cloud auth), so it runs first and fails fast.
      - name: Forward-only guard
        if: ${{ inputs.enforce_forward_only }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ENVIRONMENT: ${{ inputs.environment }}
          HEAD: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
        run: |
          if [ -z "$ENVIRONMENT" ]; then
            echo "::error::enforce_forward_only requires 'environment' (to read the live commit)." >&2
            exit 1
          fi
          # Live baseline = sha of the most recent SUCCESSFUL deployment for the env
          # (deployment ids are monotonic, so sort desc for newest-first).
          BASE=""
          for id in $(gh api "repos/${REPO}/deployments?environment=${ENVIRONMENT}&per_page=30" \
                        --jq 'sort_by(.id) | reverse | .[].id' 2>/dev/null); do
            state="$(gh api "repos/${REPO}/deployments/${id}/statuses?per_page=1" --jq '.[0].state // ""' 2>/dev/null || echo '')"
            if [ "$state" = "success" ]; then
              BASE="$(gh api "repos/${REPO}/deployments/${id}" --jq '.sha' 2>/dev/null || echo '')"
              break
            fi
          done
          if [ -z "$BASE" ]; then
            echo "::notice::forward-only: no prior successful deployment for '${ENVIRONMENT}' — allowing (no baseline)."
            exit 0
          fi
          if [ "$BASE" = "$HEAD" ]; then
            echo "::notice::forward-only: candidate equals live (${HEAD}) — no-op, allowed."
            exit 0
          fi
          # compare BASE...HEAD: 'behind' ⇒ HEAD is an ancestor of BASE ⇒ out-of-order.
          STATUS="$(gh api "repos/${REPO}/compare/${BASE}...${HEAD}" --jq '.status' 2>/dev/null || echo 'ERROR')"
          case "$STATUS" in
            behind)
              echo "::error::forward-only: candidate ${HEAD} is BEHIND live ${BASE} for '${ENVIRONMENT}' — refusing out-of-order release." >&2
              exit 1 ;;
            ahead|identical|diverged)
              echo "::notice::forward-only OK: ${HEAD} is '${STATUS}' relative to live ${BASE}." ;;
            *)
              # Fail closed: a safety guard must not wave a release through on an API error.
              echo "::error::forward-only: could not compare ${BASE}...${HEAD} (compare API error/unknown commit). Refusing; re-run, or set enforce_forward_only:false to override." >&2
              exit 1 ;;
          esac

      - name: Validate key-based credentials
        if: ${{ inputs.wif_provider == '' }}
        env:
          REG_CREDS: ${{ secrets.registry_credentials }}
          CLUSTER_CREDS: ${{ secrets.cluster_credentials }}
          DEPLOY_TARGET: ${{ inputs.deploy_target }}
        run: |
          if [ -z "$REG_CREDS" ]; then
            echo "::error::wif_provider is empty (key-based auth) but the registry_credentials secret is empty." >&2
            exit 1
          fi
          if [ "$DEPLOY_TARGET" != "none" ] && [ -z "$CLUSTER_CREDS" ]; then
            echo "::error::wif_provider is empty and deploy_target=$DEPLOY_TARGET but the cluster_credentials secret is empty." >&2
            exit 1
          fi

      # WIF path: one auth sets ADC for both the retag and the roll.
      - name: Authenticate to GCP via WIF
        if: ${{ inputs.wif_provider != '' }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ inputs.wif_provider }}
          service_account: ${{ inputs.service_account }}

      # Key path: activate the registry SA on the CLI so `add-tag` can read/write
      # the Artifact Registry repo. The roll re-auths with the cluster SA below.
      - name: Authenticate to GAR (key-based)
        if: ${{ inputs.wif_provider == '' }}
        env:
          REG_CREDS: ${{ secrets.registry_credentials }}
        run: |
          KEY="$(mktemp)"; printf '%s' "$REG_CREDS" > "$KEY"
          gcloud auth activate-service-account --key-file="$KEY"
          rm -f "$KEY"

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Retag (server-side, no rebuild)
        env:
          BASE: ${{ steps.ref.outputs.base }}
          SOURCE: ${{ steps.ref.outputs.source }}
          TARGET_TAG: ${{ steps.ref.outputs.target_tag }}
          ALSO_LATEST: ${{ inputs.also_tag_latest }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          # Verify the source image exists before promoting.
          if ! gcloud container images describe "$SOURCE" >/dev/null 2>&1; then
            echo "::error::source image not found: $SOURCE" >&2
            exit 1
          fi

          DESTS=("${BASE}:${TARGET_TAG}")
          [ "$ALSO_LATEST" = "true" ] && DESTS+=("${BASE}:latest")

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN — would run:"
            echo "  gcloud container images add-tag --quiet $SOURCE ${DESTS[*]}"
            exit 0
          fi
          gcloud container images add-tag --quiet "$SOURCE" "${DESTS[@]}"
          echo "::notice::Promoted $SOURCE -> ${DESTS[*]}"

      # ---------- GKE roll ----------
      # Key path: re-auth with the cluster SA (may differ from the registry SA)
      # so get-gke-credentials builds ADC from the right key.
      - name: Authenticate to GKE cluster (key-based)
        if: ${{ inputs.deploy_target == 'gke' && inputs.wif_provider == '' }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.cluster_credentials }}

      - name: Get GKE credentials
        if: ${{ inputs.deploy_target == 'gke' }}
        uses: google-github-actions/get-gke-credentials@3da1e46a907576cefaa90c484278bb5b259dd395 # v3.0.0
        with:
          cluster_name: ${{ inputs.cluster_name }}
          location: ${{ inputs.cluster_location }}
          project_id: ${{ inputs.cluster_project }}

      - name: Set up Helm
        if: ${{ inputs.deploy_target == 'gke' && inputs.deploy_method == 'helm' }}
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Roll GKE (kubectl)
        if: ${{ inputs.deploy_target == 'gke' && inputs.deploy_method == 'kubectl' }}
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
          SVC: ${{ inputs.svc_name }}
          NS: ${{ inputs.namespace }}
          WORKLOAD_TYPE: ${{ inputs.workload_type }}
          APP_VERSION: ${{ inputs.app_version }}
          COMMIT: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          case "$WORKLOAD_TYPE" in
            deployment) KIND=deployment ;;
            cron)       KIND=cronjob ;;
            *) echo "::error::workload_type must be 'deployment' or 'cron'" >&2; exit 1 ;;
          esac
          DR=()
          [ "$DRY_RUN" = "true" ] && DR=(--dry-run=client)
          kubectl set image "${KIND}/${SVC}" "${SVC}=${IMAGE}" --namespace "$NS" "${DR[@]}"
          # Stamp the live commit so forward-only can read it back.
          if [ -n "$COMMIT" ]; then
            kubectl annotate "${KIND}/${SVC}" "jgd.dev/commit=${COMMIT}" --overwrite --namespace "$NS" "${DR[@]}"
          fi
          if [ -n "$APP_VERSION" ] && [ "$KIND" = "deployment" ]; then
            kubectl set env "deployment/${SVC}" "APP_VERSION=${APP_VERSION}" --namespace "$NS" "${DR[@]}"
          fi

      - name: Roll GKE (helm)
        if: ${{ inputs.deploy_target == 'gke' && inputs.deploy_method == 'helm' }}
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
          RELEASE: ${{ inputs.helm_release != '' && inputs.helm_release || inputs.svc_name }}
          CHART: ${{ inputs.helm_chart }}
          NS: ${{ inputs.namespace }}
          VALUES: ${{ inputs.helm_values_path }}
          EXTRA: ${{ inputs.helm_extra_args }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ -z "$CHART" ]; then
            echo "::error::helm_chart is required when deploy_method=helm" >&2
            exit 1
          fi
          set -- helm upgrade --install "$RELEASE" "$CHART" \
            --namespace "$NS" --set image="$IMAGE"
          [ -n "$VALUES" ] && set -- "$@" --values "$VALUES"
          [ "$DRY_RUN" = "true" ] && set -- "$@" --dry-run
          # shellcheck disable=SC2086
          "$@" $EXTRA

      # ---------- Cloud Run roll ----------
      # Key path: activate the cluster SA on the CLI so `run services update` uses it.
      - name: Authenticate to Cloud Run (key-based)
        if: ${{ inputs.deploy_target == 'cloud-run' && inputs.wif_provider == '' }}
        env:
          CLUSTER_CREDS: ${{ secrets.cluster_credentials }}
        run: |
          KEY="$(mktemp)"; printf '%s' "$CLUSTER_CREDS" > "$KEY"
          gcloud auth activate-service-account --key-file="$KEY"
          rm -f "$KEY"

      - name: Roll Cloud Run
        if: ${{ inputs.deploy_target == 'cloud-run' }}
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
          RUN_PROJECT: ${{ inputs.run_project != '' && inputs.run_project || inputs.gar_project }}
          RUN_REGION: ${{ inputs.run_region != '' && inputs.run_region || inputs.gcp_region }}
          RUN_SERVICE: ${{ inputs.run_service }}
          COMMIT: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ -z "$RUN_SERVICE" ]; then
            echo "::error::run_service is required when deploy_target=cloud-run" >&2
            exit 1
          fi
          set -- gcloud run services update "$RUN_SERVICE" \
            --project "$RUN_PROJECT" --region "$RUN_REGION" \
            --image "$IMAGE" --quiet
          # Stamp the live commit (Cloud Run label; keys are slash-free).
          [ -n "$COMMIT" ] && set -- "$@" --update-labels "jgd_commit=${COMMIT}"
          if [ "$DRY_RUN" = "true" ]; then
            printf 'DRY RUN — would run:'; printf ' %q' "$@"; printf '\n'
            exit 0
          fi
          "$@"

      - name: Record GitHub Deployment (live-commit marker)
        if: ${{ inputs.environment != '' && inputs.record_github_deployment && inputs.deploy_target != 'none' && !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMIT: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
          ENVIRONMENT: ${{ inputs.environment }}
          IMAGE: ${{ steps.ref.outputs.image }}
        run: |
          # Best-effort audit record: the roll already happened, so a Deployments
          # API hiccup must NOT fail the job. Warn and move on.
          [ -z "$COMMIT" ] && { echo "::warning::no commit resolved; skipping Deployment record." >&2; exit 0; }
          BODY="$(jq -nc \
            --arg ref "$COMMIT" --arg env "$ENVIRONMENT" --arg desc "promote ${IMAGE}" \
            '{ref:$ref, environment:$env, description:$desc, auto_merge:false, required_contexts:[]}')"
          DEP_ID="$(printf '%s' "$BODY" | gh api "repos/${REPO}/deployments" --input - --jq '.id' 2>/dev/null || true)"
          if [ -z "$DEP_ID" ] || [ "$DEP_ID" = "null" ]; then
            echo "::warning::could not create GitHub Deployment (missing deployments: write, or API conflict); service label/annotation still stamped." >&2
            exit 0
          fi
          gh api "repos/${REPO}/deployments/${DEP_ID}/statuses" \
            -f state=success -f environment="$ENVIRONMENT" -f description="promote ${IMAGE}" >/dev/null 2>&1 \
            || echo "::warning::deployment #${DEP_ID} created but status update failed." >&2
          echo "::notice::recorded GitHub Deployment #${DEP_ID} (${ENVIRONMENT} @ ${COMMIT})"

      - name: Summary
        if: ${{ always() }}
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
          SOURCE: ${{ steps.ref.outputs.source }}
          TARGET_DESC: ${{ inputs.deploy_target }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          {
            echo "## Promote image"
            echo ""
            echo "- From: \`${SOURCE}\`"
            echo "- To:   \`${IMAGE}\`${DRY_RUN:+ (dry run)}"
            echo "- Roll: \`${TARGET_DESC}\`"
          } >> "$GITHUB_STEP_SUMMARY"
